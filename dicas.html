<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Magnus Capital — Dicas Diárias</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#C8102E;--red-dark:#A00D24;--white:#FFFFFF;--off-white:#F8F6F3;--black:#0D0D0D;--gray-soft:#6B6B6B;--gray-line:#E0DEDD;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--black)}
    .bg-layer{position:fixed;inset:0;z-index:0;background:var(--off-white)}
    .bg-layer::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,16,46,0.07) 0%,transparent 70%);animation:pbg 8s ease infinite alternate}
    @keyframes pbg{from{transform:scale(1)}to{transform:scale(1.15)}}
    .header{position:sticky;top:0;z-index:100;background:rgba(248,246,243,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-line);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
    .back-btn{width:36px;height:36px;border:1.5px solid var(--gray-line);border-radius:10px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--black);transition:all .25s;flex-shrink:0}
    .back-btn:hover{border-color:var(--red);color:var(--red)}
    .h-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
    .content{position:relative;z-index:1;padding:24px 20px 40px;max-width:500px;margin:0 auto}

    /* HERO DICA DO DIA */
    .dica-hero{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);border-radius:22px;padding:28px;color:var(--white);margin-bottom:20px;animation:fadeUp .6s ease both;position:relative;overflow:hidden}
    .dica-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
    .dh-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 13px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
    .dh-badge svg{width:12px;height:12px}
    .dh-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:10px}
    .dh-highlight{background:rgba(255,255,255,.15);border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;margin-bottom:12px;border-left:3px solid rgba(255,255,255,.5)}
    .dh-sub{font-size:12px;opacity:.8;line-height:1.7}
    .dh-nav{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.15)}
    .dh-dots{display:flex;gap:5px}
    .dh-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);transition:all .3s;cursor:pointer}
    .dh-dot.active{background:var(--white);width:16px;border-radius:3px}
    .dh-arrows{display:flex;gap:8px}
    .dh-arrow{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.15);border:none;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .dh-arrow:hover{background:rgba(255,255,255,.25)}
    .dh-arrow svg{width:15px;height:15px}

    /* CATEGORIA TABS */
    .cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;scrollbar-width:none;animation:fadeUp .6s ease .08s both}
    .cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--gray-line);background:var(--white);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .25s;color:var(--gray-soft)}
    .cat-tab.active{background:var(--red);color:var(--white);border-color:var(--red)}

    /* DICAS LIST */
    .dicas-list{display:flex;flex-direction:column;gap:12px}
    .dica-card{background:var(--white);border-radius:16px;padding:18px;border:1px solid var(--gray-line);box-shadow:0 3px 14px rgba(0,0,0,.04);animation:fadeUp .5s ease both;transition:transform .25s,box-shadow .25s;cursor:pointer}
    .dica-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,16,46,.08);border-color:rgba(200,16,46,.2)}
    .dc-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .dc-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .dc-icon svg{width:18px;height:18px}
    .dc-cat{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
    .dc-question{font-size:14px;font-weight:600;color:var(--black);line-height:1.4}
    .dc-answer{font-size:12px;color:var(--gray-soft);line-height:1.7}
    .dc-highlight{background:rgba(200,16,46,.06);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12px;color:var(--black);font-weight:500;margin-top:10px;line-height:1.6}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="header">
  <a href="index.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="h-title">Você Sabia?</div>
</div>

<div class="content">
  <!-- HERO DICA DO DIA -->
  <div class="dica-hero" id="dicaHero">
    <div class="dh-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Dica do Dia</div>
    <div class="dh-title" id="heroTitle">A carregar...</div>
    <div class="dh-highlight" id="heroHighlight"></div>
    <div class="dh-sub" id="heroSub"></div>
    <div class="dh-nav">
      <div class="dh-dots" id="heroDots"></div>
      <div class="dh-arrows">
        <button class="dh-arrow" onclick="prevHero()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button class="dh-arrow" onclick="nextHero()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
  </div>

  <!-- CATEGORIA TABS -->
  <div class="cat-tabs" id="catTabs">
    <div class="cat-tab active" onclick="filterCat('all',this)">Todas</div>
    <div class="cat-tab" onclick="filterCat('investimento',this)">Investimento</div>
    <div class="cat-tab" onclick="filterCat('poupanca',this)">Poupança</div>
    <div class="cat-tab" onclick="filterCat('rendimento',this)">Rendimento</div>
    <div class="cat-tab" onclick="filterCat('afiliados',this)">Afiliados</div>
  </div>

  <!-- DICAS LIST -->
  <div class="dicas-list" id="dicasList"></div>
</div>

<script>
  const fmt=n=>Number(Math.round(n)).toLocaleString('pt-AO');

  const heroTips=[
    {title:'Investir 50.000 Kz/mês durante 1 ano',highlight:'Se investir 50.000 Kz por mês durante 1 ano, acumulará aproximadamente '+fmt(50000*12+50000*12*0.05*30*6)+' Kz.',sub:'Os rendimentos diários de 5% sobre o seu investimento trabalham para si todos os dias, 24 horas por dia.'},
    {title:'O poder do reinvestimento',highlight:'Reinvestir os seus rendimentos mensalmente pode triplicar o resultado em 5 anos.',sub:'Em vez de levantar todos os ganhos, mantê-los investidos acelera exponencialmente o crescimento do seu capital.'},
    {title:'Convide 5 amigos e multiplique os ganhos',highlight:'5 afiliados com plano G3 (10.000 Kz) geram-lhe 5.000 Kz de comissão instantânea.',sub:'O programa de afiliados da Magnus Capital é ilimitado. Cada indicação activa representa 10% do primeiro investimento directamente para si.'},
    {title:'Consistência é mais importante que valor',highlight:'Investir 10.000 Kz/mês durante 24 meses supera investir 200.000 Kz uma única vez.',sub:'A regularidade permite acumular rendimentos compostos mês após mês, enquanto um depósito único produz apenas rendimentos lineares.'},
  ];

  const allDicas=[
    {cat:'investimento',color:'rgba(200,16,46,.08)',textColor:'var(--red)',icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',question:'Você sabia que investindo 50.000 Kz/dia, em 1 ano acumula mais de '+fmt(50000*365*0.05)+' Kz em rendimentos?',answer:'Com uma taxa diária de 5%, cada 50.000 Kz investidos gera 2.500 Kz por dia. Em 365 dias, são mais de 912.500 Kz apenas em rendimentos, além do capital inicial.',highlight:'50.000 Kz × 5%/dia × 365 dias = '+fmt(50000*0.05*365)+' Kz em rendimentos'},
    {cat:'poupanca',color:'rgba(22,163,74,.08)',textColor:'#16A34A',icon:'<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',question:'Guardar dinheiro em casa vs investir na Magnus Capital — qual a diferença?',answer:'Guardar 100.000 Kz em casa durante 1 ano continua sendo 100.000 Kz. Investindo na Magnus Capital ao plano G3, gera 5% por dia, podendo acumular muito mais.',highlight:'100.000 Kz guardados = 0 Kz de crescimento. 100.000 Kz investidos = rendimento diário activo'},
    {cat:'rendimento',color:'rgba(245,158,11,.08)',textColor:'#D97706',icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',question:'Você sabia que os seus rendimentos são creditados todos os dias à mesma hora?',answer:'A Magnus Capital credita os rendimentos exactamente 24 horas após a activação do seu investimento. Isso significa que sabe exactamente quando o seu dinheiro cresce.',highlight:'Rendimento disponível todos os dias na mesma hora — sem surpresas'},
    {cat:'afiliados',color:'rgba(139,92,246,.08)',textColor:'#7C3AED',icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>',question:'Com 10 afiliados activos no Plano G5, quanto ganha de comissão?',answer:'O Plano G5 exige 30.000 Kz de investimento. Com 10% de comissão sobre esse valor, cada afiliado gera 3.000 Kz para si. Com 10 afiliados: 30.000 Kz de comissão.',highlight:'10 afiliados × 30.000 Kz × 10% = '+fmt(10*30000*0.1)+' Kz de comissão total'},
    {cat:'investimento',color:'rgba(200,16,46,.08)',textColor:'var(--red)',icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',question:'Qual é o melhor plano para quem está a começar?',answer:'O Plano G1 (4.000 Kz) é ideal para iniciantes. Com 5% de rendimento diário, gera 200 Kz por dia — suficiente para sentir o crescimento e ganhar confiança antes de escalar.',highlight:'Plano G1: 4.000 Kz investidos = 200 Kz/dia = 6.000 Kz/mês em rendimentos'},
    {cat:'poupanca',color:'rgba(22,163,74,.08)',textColor:'#16A34A',icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>',question:'Você sabia que pode levantar os rendimentos e manter o capital a trabalhar?',answer:'Na Magnus Capital, os rendimentos são convertidos separadamente do capital investido. Pode levantar os ganhos diários e manter o investimento original a gerar mais rendimento.',highlight:'Capital principal intacto + levantamento de rendimentos = estratégia equilibrada'},
    {cat:'rendimento',color:'rgba(245,158,11,.08)',textColor:'#D97706',icon:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',question:'Quanto tempo demora a dobrar o investimento no Plano G3?',answer:'Com 5% de rendimento diário sobre 10.000 Kz, gera 500 Kz por dia. Para acumular mais 10.000 Kz em rendimentos, são necessários 20 dias de investimento activo.',highlight:'10.000 Kz ÷ 500 Kz/dia = 20 dias para duplicar via rendimentos'},
    {cat:'afiliados',color:'rgba(139,92,246,.08)',textColor:'#7C3AED',icon:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',question:'Como funciona exactamente o programa de afiliados da Magnus Capital?',answer:'Ao partilhar o seu link de convite, cada pessoa que se regista e faz o primeiro investimento gera para si 10% do valor desse investimento, pago como comissão única.',highlight:'Sem limite de afiliados · Comissão paga pelo primeiro investimento de cada indicado'},
  ];

  let currentHero=0;
  let currentCat='all';
  let heroInterval;

  function renderHero(){
    const h=heroTips[currentHero];
    document.getElementById('heroTitle').textContent=h.title;
    document.getElementById('heroHighlight').textContent=h.highlight;
    document.getElementById('heroSub').textContent=h.sub;
    const dots=document.getElementById('heroDots');
    dots.innerHTML='';
    heroTips.forEach((_,i)=>{
      const d=document.createElement('div');
      d.className='dh-dot'+(i===currentHero?' active':'');
      d.onclick=()=>{currentHero=i;renderHero();};
      dots.appendChild(d);
    });
  }
  function nextHero(){currentHero=(currentHero+1)%heroTips.length;renderHero();}
  function prevHero(){currentHero=(currentHero-1+heroTips.length)%heroTips.length;renderHero();}

  function renderDicas(){
    const list=document.getElementById('dicasList');
    list.innerHTML='';
    const filtered=currentCat==='all'?allDicas:allDicas.filter(d=>d.cat===currentCat);
    filtered.forEach((d,i)=>{
      list.innerHTML+=`<div class="dica-card" style="animation-delay:${i*0.06}s">
        <div class="dc-header">
          <div class="dc-icon" style="background:${d.color};color:${d.textColor}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${d.icon}</svg></div>
          <div><div class="dc-cat" style="color:${d.textColor}">${d.cat}</div><div class="dc-question">${d.question}</div></div>
        </div>
        <div class="dc-answer">${d.answer}</div>
        <div class="dc-highlight">${d.highlight}</div>
      </div>`;
    });
  }

  function filterCat(cat,el){
    currentCat=cat;
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderDicas();
  }

  window.nextHero=nextHero;window.prevHero=prevHero;window.filterCat=filterCat;

  renderHero();
  renderDicas();
  heroInterval=setInterval(nextHero,5000);
</script>
</body>
</html>
