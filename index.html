<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora Meta — Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",
      authDomain: "pinnacle-finance-b2626.firebaseapp.com",
      projectId: "pinnacle-finance-b2626",
      storageBucket: "pinnacle-finance-b2626.firebasestorage.app",
      messagingSenderId: "1032490368286",
      appId: "1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let saldoOculto = false;
    let saldoDisponivel = 0;
    let totalDepositado = 0;
    let totalLevantado = 0;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "auth.html"; return; }

      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) { window.location.href = "auth.html"; return; }

      const data = snap.data();
      document.getElementById("user-name").textContent = (data.nomeCompleto || "").split(" ")[0];
      document.getElementById("account-number").textContent = data.accountNumber || "—";
      saldoDisponivel = data.saldo || 0;

      const movQ = query(collection(db, "users", user.uid, "movimentos"), orderBy("data", "desc"));
      const movSnap = await getDocs(movQ);

      movSnap.forEach(d => {
        const m = d.data();
        const tipo = (m.tipo || "").toLowerCase();
        if (tipo === "deposito") totalDepositado += (m.valor || 0);
        if (["levantamento","retirada"].includes(tipo)) totalLevantado += (m.valor || 0);
      });

      atualizarSaldos();

      // historico recente (6)
      const recentQ = query(collection(db, "users", user.uid, "movimentos"), orderBy("data", "desc"), limit(6));
      const recentSnap = await getDocs(recentQ);
      const lista = document.getElementById("historico-lista");
      lista.innerHTML = "";
      if (recentSnap.empty) {
        lista.innerHTML = `<div class="empty-msg">Sem movimentos ainda</div>`;
      } else {
        recentSnap.forEach(d => lista.appendChild(buildMovItem(d.data())));
      }
    });

    function atualizarSaldos() {
      const mask = "••••••";
      document.getElementById("saldo-disponivel").textContent = saldoOculto ? mask : formatVal(saldoDisponivel) + " Kz";
      document.getElementById("saldo-depositado").textContent = saldoOculto ? mask : formatVal(totalDepositado) + " Kz";
      document.getElementById("saldo-levantado").textContent  = saldoOculto ? mask : formatVal(totalLevantado)  + " Kz";
    }

    window.toggleSaldos = function () {
      saldoOculto = !saldoOculto;
      const el = document.getElementById("eye-icon");
      el.innerHTML = saldoOculto
        ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke-linecap="round" stroke-linejoin="round"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      atualizarSaldos();
    };

    function formatVal(v) {
      return Number(v).toLocaleString("pt-AO", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function buildMovItem(m) {
      const div = document.createElement("div");
      div.className = "mov-item";
      const tipo = (m.tipo || "").toLowerCase();
      let cls = "mov-orange";
      if (["deposito","bonus","rendimento","comissao"].includes(tipo)) cls = "mov-green";
      if (["levantamento","retirada"].includes(tipo)) cls = "mov-red";
      const sinal = cls === "mov-red" ? "-" : "+";
      const data = m.data?.toDate ? m.data.toDate().toLocaleDateString("pt-AO") : "—";
      div.innerHTML = `
        <div class="mov-left">
          <div class="mov-desc">${m.descricao || capitalize(m.tipo)}</div>
          <div class="mov-date">${data}</div>
        </div>
        <div class="mov-val ${cls}">${sinal} ${formatVal(m.valor || 0)} Kz</div>`;
      return div;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316; --green: #16A34A; --red: #DC2626; --blue: #1D4ED8;
      --black: #111111; --gray: #6B7280; --gray-light: #F3F4F6; --border: #E5E7EB;
      --font: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font); background: #fff; color: var(--black); overflow-y: auto; overflow-x: hidden; min-height: 100vh; padding-bottom: 90px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 0% 0%, rgba(249,115,22,0.09) 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, rgba(249,115,22,0.08) 0%, transparent 55%); pointer-events: none; z-index: 0; }
    .deco-circle { position: fixed; border-radius: 50%; border: 1.5px solid rgba(249,115,22,0.16); background: transparent; pointer-events: none; z-index: 0; }
    .dc1 { width: 420px; height: 420px; top: -140px; left: -140px; }
    .dc2 { width: 280px; height: 280px; top: -60px; left: -60px; border-color: rgba(249,115,22,0.12); }
    .dc3 { width: 360px; height: 360px; bottom: -120px; right: -120px; }
    .dc4 { width: 200px; height: 200px; bottom: -50px; right: -50px; border-color: rgba(249,115,22,0.13); }

    .page-wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 24px; }

    /* top bar */
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 0; }
    .logo-sm { font-size: 17px; font-weight: 700; color: var(--black); }
    .logo-sm span { color: var(--orange); }
    .greeting { font-size: 13px; color: var(--gray); }
    .greeting strong { color: var(--black); font-weight: 600; }

    /* balance card */
    .balance-card {
      margin: 18px 20px 0;
      background: var(--black);
      border-radius: 20px;
      padding: 20px 18px 18px;
      position: relative;
      overflow: hidden;
    }
    .balance-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 150px; height: 150px; border-radius: 50%; border: 1.5px solid rgba(249,115,22,0.2); }
    .balance-card::after  { content: ''; position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px; border-radius: 50%; border: 1.5px solid rgba(249,115,22,0.12); }

    .bc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .bc-account { font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: 0.3px; }
    .btn-eye { background: transparent; border: none; cursor: pointer; padding: 3px; display: flex; align-items: center; }
    .btn-eye svg { width: 17px; height: 17px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .saldos-grid { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; align-items: center; }
    .saldo-col { text-align: center; padding: 2px 4px; }
    .saldo-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .saldo-label.orange { color: var(--orange); }
    .saldo-label.green  { color: #4ADE80; }
    .saldo-label.red    { color: #F87171; }
    .saldo-val { font-size: 12px; font-weight: 600; color: #fff; }
    .saldo-divider { width: 1px; height: 34px; background: rgba(255,255,255,0.1); }

    /* quick actions */
    .section-title { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.6px; padding: 20px 20px 12px; }
    .quick-actions { display: flex; gap: 10px; padding: 0 20px; }
    .qa-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 14px 6px; border-radius: 14px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; text-decoration: none; transition: border-color 0.2s; }
    .qa-btn:hover { border-color: var(--orange); }
    .qa-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .qa-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .qa-icon.green { background: rgba(22,163,74,0.08); } .qa-icon.green svg { stroke: var(--green); }
    .qa-icon.red   { background: rgba(220,38,38,0.08); } .qa-icon.red svg   { stroke: var(--red); }
    .qa-icon.blue  { background: rgba(29,78,216,0.08); } .qa-icon.blue svg  { stroke: var(--blue); }
    .qa-label { font-size: 12px; font-weight: 600; color: var(--black); }

    /* historico */
    .hist-card { margin: 0 20px; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: #fff; }
    .hist-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .hist-header span { font-size: 13px; font-weight: 700; color: var(--black); }
    .hist-header a { font-size: 12px; color: var(--orange); font-weight: 600; text-decoration: none; }
    .mov-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .mov-item:last-child { border-bottom: none; }
    .mov-left { display: flex; flex-direction: column; gap: 2px; }
    .mov-desc { font-size: 13px; font-weight: 600; color: var(--black); }
    .mov-date { font-size: 11px; color: var(--gray); }
    .mov-val { font-size: 13px; font-weight: 700; }
    .mov-green { color: var(--green); } .mov-red { color: var(--red); } .mov-orange { color: var(--orange); }
    .empty-msg { padding: 22px 16px; font-size: 13px; color: var(--gray); text-align: center; }

    /* nav */
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 100; max-width: 480px; margin: 0 auto; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px 12px; text-decoration: none; }
    .nav-item svg { width: 22px; height: 22px; stroke: var(--gray); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item span { font-size: 10px; font-weight: 600; color: var(--gray); }
    .nav-item.active svg { stroke: var(--orange); }
    .nav-item.active span { color: var(--orange); }
  </style>
</head>
<body>
  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>
  <div class="deco-circle dc4"></div>

  <div class="page-wrap">
    <div class="top-bar">
      <div class="logo-sm">Filmora <span>Meta</span></div>
      <div class="greeting">Ola, <strong id="user-name">—</strong></div>
    </div>

    <div class="balance-card">
      <div class="bc-top">
        <div class="bc-account" id="account-number">—</div>
        <button class="btn-eye" onclick="toggleSaldos()">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="saldos-grid">
        <div class="saldo-col">
          <div class="saldo-label orange">Disponivel</div>
          <div class="saldo-val" id="saldo-disponivel">— Kz</div>
        </div>
        <div class="saldo-divider"></div>
        <div class="saldo-col">
          <div class="saldo-label green">Depositado</div>
          <div class="saldo-val" id="saldo-depositado">— Kz</div>
        </div>
        <div class="saldo-divider"></div>
        <div class="saldo-col">
          <div class="saldo-label red">Levantado</div>
          <div class="saldo-val" id="saldo-levantado">— Kz</div>
        </div>
      </div>
    </div>

    <div class="section-title">Accoes Rapidas</div>
    <div class="quick-actions">
      <a class="qa-btn" href="deposito.html">
        <div class="qa-icon green"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>
        <span class="qa-label">Deposito</span>
      </a>
      <a class="qa-btn" href="levantar.html">
        <div class="qa-icon red"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
        <span class="qa-label">Levantar</span>
      </a>
      <a class="qa-btn" href="planos.html">
        <div class="qa-icon blue"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
        <span class="qa-label">Planos</span>
      </a>
    </div>

    <div class="section-title">Ultimos Movimentos</div>
    <div class="hist-card">
      <div class="hist-header">
        <span>Historico Recente</span>
        <a href="historico.html">Ver todos</a>
      </div>
      <div id="historico-lista"><div class="empty-msg">A carregar...</div></div>
    </div>
  </div>

  <nav class="nav-bar">
    <a class="nav-item active" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Inicial</span>
    </a>
    <a class="nav-item" href="planos.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Planos</span>
    </a>
    <a class="nav-item" href="tarefas.html">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Tarefas</span>
    </a>
    <a class="nav-item" href="menu.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Menu</span>
    </a>
  </nav>
</body>
</html>
