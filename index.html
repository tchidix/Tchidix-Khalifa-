<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora Meta — Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",
      authDomain: "pinnacle-finance-b2626.firebaseapp.com",
      projectId: "pinnacle-finance-b2626",
      storageBucket: "pinnacle-finance-b2626.firebasestorage.app",
      messagingSenderId: "1032490368286",
      appId: "1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "auth.html"; return; }

      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists()) { window.location.href = "auth.html"; return; }

      const data = snap.data();

      document.getElementById("user-name").textContent = (data.nomeCompleto || "").split(" ")[0];
      document.getElementById("account-number").textContent = data.accountNumber || "—";
      document.getElementById("saldo-principal").textContent = formatVal(data.saldo || 0);

      // movimentos recentes (6)
      const movQ = query(collection(db, "users", user.uid, "movimentos"), orderBy("data", "desc"), limit(6));
      const movSnap = await getDocs(movQ);
      const lista = document.getElementById("historico-lista");
      lista.innerHTML = "";
      if (movSnap.empty) {
        lista.innerHTML = `<div class="empty-msg">Sem movimentos ainda</div>`;
      } else {
        movSnap.forEach(d => {
          const m = d.data();
          lista.appendChild(buildMovItem(m));
        });
      }
    });

    function formatVal(v) {
      return Number(v).toLocaleString("pt-AO", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function buildMovItem(m) {
      const div = document.createElement("div");
      div.className = "mov-item";
      const tipo = (m.tipo || "").toLowerCase();
      let colorClass = "mov-orange";
      if (tipo === "deposito" || tipo === "bonus" || tipo === "rendimento" || tipo === "comissao") colorClass = "mov-green";
      if (tipo === "levantamento" || tipo === "retirada") colorClass = "mov-red";

      const sinal = colorClass === "mov-red" ? "-" : "+";
      const data = m.data?.toDate ? m.data.toDate().toLocaleDateString("pt-AO") : "—";

      div.innerHTML = `
        <div class="mov-left">
          <div class="mov-desc">${m.descricao || capitalize(m.tipo)}</div>
          <div class="mov-date">${data}</div>
        </div>
        <div class="mov-val ${colorClass}">${sinal} ${formatVal(m.valor || 0)} Kz</div>
      `;
      return div;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }

    window.doLogout = async function () {
      await signOut(auth);
      window.location.href = "auth.html";
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316;
      --green: #16A34A;
      --red: #DC2626;
      --blue: #1D4ED8;
      --black: #111111;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --border: #E5E7EB;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: #fff;
      color: var(--black);
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(249,115,22,0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(249,115,22,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .deco-circle { position: fixed; border-radius: 50%; border: 1.5px solid rgba(249,115,22,0.16); background: transparent; pointer-events: none; z-index: 0; }
    .dc1 { width: 420px; height: 420px; top: -140px; left: -140px; }
    .dc2 { width: 280px; height: 280px; top: -60px; left: -60px; border-color: rgba(249,115,22,0.12); }
    .dc3 { width: 360px; height: 360px; bottom: -120px; right: -120px; }
    .dc4 { width: 200px; height: 200px; bottom: -50px; right: -50px; border-color: rgba(249,115,22,0.13); }

    .page-wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 24px; }

    /* ── header ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }
    .logo-sm { font-size: 17px; font-weight: 700; color: var(--black); }
    .logo-sm span { color: var(--orange); }
    .greeting { font-size: 13px; color: var(--gray); }
    .greeting strong { color: var(--black); font-weight: 600; }

    /* ── saldo card ── */
    .balance-card {
      margin: 18px 20px 0;
      background: var(--black);
      border-radius: 20px;
      padding: 24px 22px 20px;
      position: relative;
      overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 1.5px solid rgba(249,115,22,0.25);
    }
    .balance-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1.5px solid rgba(249,115,22,0.15);
    }
    .balance-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .balance-val {
      font-size: 34px;
      font-weight: 700;
      color: var(--orange);
      font-family: var(--mono);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .balance-currency { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 400; margin-bottom: 18px; }
    .account-row { display: flex; align-items: center; justify-content: space-between; }
    .account-num { font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }
    .badge-active { font-size: 10px; background: rgba(22,163,74,0.2); color: #4ADE80; border-radius: 50px; padding: 3px 10px; font-weight: 600; border: 1px solid rgba(22,163,74,0.3); }

    /* ── quick actions ── */
    .section-title { font-size: 13px; font-weight: 700; color: var(--black); text-transform: uppercase; letter-spacing: 0.5px; padding: 20px 20px 12px; }

    .quick-actions { display: flex; gap: 12px; padding: 0 20px; }
    .qa-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 10px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .qa-btn:hover { border-color: var(--orange); box-shadow: 0 2px 12px rgba(249,115,22,0.1); }
    .qa-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .qa-icon svg { width: 20px; height: 20px; }
    .qa-icon.orange { background: rgba(249,115,22,0.1); }
    .qa-icon.orange svg { stroke: var(--orange); }
    .qa-icon.red { background: rgba(220,38,38,0.08); }
    .qa-icon.red svg { stroke: var(--red); }
    .qa-icon.green { background: rgba(22,163,74,0.08); }
    .qa-icon.green svg { stroke: var(--green); }
    .qa-icon.blue { background: rgba(29,78,216,0.08); }
    .qa-icon.blue svg { stroke: var(--blue); }
    .qa-label { font-size: 12px; font-weight: 600; color: var(--black); }

    /* ── historico ── */
    .hist-card {
      margin: 0 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }
    .hist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .hist-header span { font-size: 13px; font-weight: 700; color: var(--black); }
    .hist-header a { font-size: 12px; color: var(--orange); font-weight: 600; text-decoration: none; }

    .mov-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .mov-item:last-child { border-bottom: none; }
    .mov-item:hover { background: var(--gray-light); }
    .mov-left { display: flex; flex-direction: column; gap: 2px; }
    .mov-desc { font-size: 13px; font-weight: 600; color: var(--black); }
    .mov-date { font-size: 11px; color: var(--gray); }
    .mov-val { font-size: 14px; font-weight: 700; font-family: var(--mono); }
    .mov-green { color: var(--green); }
    .mov-red { color: var(--red); }
    .mov-orange { color: var(--orange); }
    .empty-msg { padding: 24px 16px; font-size: 13px; color: var(--gray); text-align: center; }

    /* ── nav bar ── */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px 12px;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item svg { width: 22px; height: 22px; stroke: var(--gray); fill: none; stroke-width: 1.8; transition: stroke 0.2s; }
    .nav-item span { font-size: 10px; font-weight: 600; color: var(--gray); letter-spacing: 0.2px; transition: color 0.2s; }
    .nav-item.active svg { stroke: var(--orange); }
    .nav-item.active span { color: var(--orange); }

    /* ── toast ── */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: #fff; padding: 12px 22px; border-radius: 50px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 1000; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
  </style>
</head>
<body>

  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>
  <div class="deco-circle dc4"></div>

  <div class="toast" id="toast"></div>

  <div class="page-wrap">

    <!-- topo -->
    <div class="top-bar">
      <div class="logo-sm">Filmora <span>Meta</span></div>
      <div class="greeting">Ola, <strong id="user-name">—</strong></div>
    </div>

    <!-- saldo -->
    <div class="balance-card">
      <div class="balance-label">Saldo Disponivel</div>
      <div class="balance-val" id="saldo-principal">0,00</div>
      <div class="balance-currency">Kwanza (Kz)</div>
      <div class="account-row">
        <div class="account-num" id="account-number">—</div>
        <div class="badge-active">Activo</div>
      </div>
    </div>

    <!-- accoes rapidas -->
    <div class="section-title">Accoes Rapidas</div>
    <div class="quick-actions">
      <a class="qa-btn" href="deposito.html">
        <div class="qa-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </div>
        <span class="qa-label">Deposito</span>
      </a>
      <a class="qa-btn" href="levantar.html">
        <div class="qa-icon red">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </div>
        <span class="qa-label">Levantar</span>
      </a>
      <a class="qa-btn" href="transferencia.html">
        <div class="qa-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M15 7l5 5-5 5"/></svg>
        </div>
        <span class="qa-label">Transferir</span>
      </a>
    </div>

    <!-- historico -->
    <div class="section-title">Ultimos Movimentos</div>
    <div class="hist-card">
      <div class="hist-header">
        <span>Historico Recente</span>
        <a href="historico.html">Ver todos</a>
      </div>
      <div id="historico-lista">
        <div class="empty-msg">A carregar...</div>
      </div>
    </div>

  </div>

  <!-- nav bar fixa -->
  <nav class="nav-bar">
    <a class="nav-item active" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Inicial</span>
    </a>
    <a class="nav-item" href="planos.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Planos</span>
    </a>
    <a class="nav-item" href="tarefas.html">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Tarefas</span>
    </a>
    <a class="nav-item" href="menu.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Menu</span>
    </a>
  </nav>

</body>
</html>
