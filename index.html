<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora Meta — Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",
      authDomain: "pinnacle-finance-b2626.firebaseapp.com",
      projectId: "pinnacle-finance-b2626",
      storageBucket: "pinnacle-finance-b2626.firebasestorage.app",
      messagingSenderId: "1032490368286",
      appId: "1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function fmt(n) {
      return Number(n || 0).toLocaleString('pt-AO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function greeting() {
      const h = new Date().getHours();
      if (h < 12) return 'Bom dia';
      if (h < 18) return 'Boa tarde';
      return 'Boa noite';
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'auth.html'; return; }

      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = 'auth.html'; return; }
      const data = snap.data();

      const firstName = (data.email || '').split('@')[0];
      document.getElementById('greeting-text').textContent = greeting() + ', ' + firstName;
      document.getElementById('account-id-val').textContent = data.accountId || '—';
      document.getElementById('bal-available').textContent = fmt(data.balance);
      document.getElementById('bal-deposited').textContent = fmt(data.deposited);
      document.getElementById('bal-withdrawn').textContent = fmt(data.withdrawn);

      // live earnings ticker
      startLiveTicker();

      // history
      const hq = query(
        collection(db, 'transactions'),
        where('uid', '==', user.uid),
        orderBy('createdAt', 'desc'),
        limit(6)
      );
      onSnapshot(hq, (qs) => {
        const list = document.getElementById('history-list');
        if (qs.empty) { list.innerHTML = '<div class="hist-empty">Sem movimentos ainda.</div>'; return; }
        list.innerHTML = '';
        qs.forEach(d => {
          const t = d.data();
          const sign = t.type === 'debit' ? '-' : '+';
          const cls  = t.type === 'debit' ? 'hist-red' : (t.type === 'deposit' ? 'hist-green' : 'hist-orange');
          list.innerHTML += `
            <div class="hist-item">
              <div class="hist-left">
                <div class="hist-dot ${cls}"></div>
                <div>
                  <div class="hist-label">${t.description || '—'}</div>
                  <div class="hist-date">${t.createdAt?.toDate ? t.createdAt.toDate().toLocaleDateString('pt-AO') : '—'}</div>
                </div>
              </div>
              <div class="hist-amount ${cls}">${sign} ${fmt(t.amount)} <span class="curr">AOA</span></div>
            </div>`;
        });
      });

      window.doLogout = async () => {
        await signOut(auth);
        window.location.href = 'auth.html';
      };
    });

    const liveNames = ['C.Manuel','A.Silva','J.Pedro','M.Santos','R.Costa','L.Ferreira','D.Neto','F.Lopes'];
    const liveAmounts = [300,600,1200,50,300,600,1200,50];
    let liveIdx = 0;
    function startLiveTicker() {
      const el = document.getElementById('live-ticker');
      function tick() {
        const name = liveNames[liveIdx % liveNames.length];
        const amt  = liveAmounts[liveIdx % liveAmounts.length];
        el.innerHTML = `<span class="ticker-dot"></span> <strong>${name}</strong> recebeu <strong>+ ${amt} AOA</strong>`;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'ticker-fade 0.5s ease';
        liveIdx++;
      }
      tick();
      setInterval(tick, 3500);
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --orange: #F59E0B; --green: #10B981;
      --red: #EF4444; --black: #000; --white: #fff;
    }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      color: var(--black);
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 90px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(59,130,246,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(59,130,246,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    .deco-circle { position: fixed; border-radius: 50%; background: transparent; pointer-events: none; z-index: 0; }
    .tl-1 { width:420px;height:420px;top:-140px;left:-140px;border:1.5px solid rgba(59,130,246,0.14); }
    .tl-2 { width:280px;height:280px;top:-70px;left:-70px;border:1.5px solid rgba(59,130,246,0.10); }
    .br-1 { width:360px;height:360px;bottom:-120px;right:-120px;border:1.5px solid rgba(59,130,246,0.14); }
    .br-2 { width:200px;height:200px;bottom:-60px;right:-60px;border:1.5px solid rgba(59,130,246,0.10); }

    .page { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px; }

    /* HEADER */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0 16px;
    }
    .greeting { font-size: 1.05rem; font-weight: 700; color: var(--black); }
    .greeting-sub { font-size: 0.75rem; color: rgba(0,0,0,0.4); margin-top: 2px; }
    .notif-btn {
      width: 38px; height: 38px; border-radius: 12px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59,130,246,0.18);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .notif-btn svg { width: 18px; height: 18px; stroke: var(--blue); fill: none; stroke-width: 2; }

    /* BALANCE CARD */
    .balance-card {
      background: linear-gradient(135deg, #1D4ED8 0%, #3B82F6 60%, #60A5FA 100%);
      border-radius: 22px;
      padding: 26px 24px 22px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.28);
      position: relative;
      overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .balance-card::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -20px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .balance-label { font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .balance-amount {
      font-size: 2.1rem; font-weight: 700; color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      position: relative; z-index: 1;
    }
    .balance-amount .curr-tag { font-size: 60%; color: rgba(255,255,255,0.6); font-weight: 500; margin-left: 4px; }
    .balance-sub-row {
      display: flex; gap: 16px; margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 14px;
      position: relative; z-index: 1;
    }
    .balance-sub { flex: 1; }
    .balance-sub-label { font-size: 0.68rem; color: rgba(255,255,255,0.55); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
    .balance-sub-val { font-size: 0.92rem; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 3px; }
    .val-green { color: #6EE7B7; }
    .val-red   { color: #FCA5A5; }
    .account-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 14px;
      position: relative; z-index: 1;
    }
    .account-id-label { font-size: 0.68rem; color: rgba(255,255,255,0.5); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
    .account-id-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.85);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1.5px;
    }

    /* LIVE TICKER */
    .live-bar {
      background: rgba(16,185,129,0.07);
      border: 1px solid rgba(16,185,129,0.18);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: var(--green);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }
    #live-ticker { display: flex; align-items: center; gap: 6px; }
    .ticker-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.2s ease infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes ticker-fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* ACTION BUTTONS */
    .action-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; }
    .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .action-circle {
      width: 58px; height: 58px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59,130,246,0.22);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(59,130,246,0.1);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .action-circle:active { transform: scale(0.93); }
    .action-circle svg { width: 22px; height: 22px; stroke: var(--blue); fill: none; stroke-width: 2; }
    .action-label { font-size: 0.72rem; font-weight: 600; color: rgba(0,0,0,0.5); letter-spacing: 0.3px; }

    /* SECTION TITLE */
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-size: 0.88rem; font-weight: 700; color: var(--black); }
    .section-link { font-size: 0.75rem; font-weight: 600; color: var(--blue); cursor: pointer; }

    /* HISTORY */
    .history-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59,130,246,0.12);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .hist-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(59,130,246,0.07);
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-left { display: flex; align-items: center; gap: 10px; }
    .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-green { color: var(--green); } .hist-dot.hist-green { background: var(--green); }
    .hist-red   { color: var(--red); }   .hist-dot.hist-red   { background: var(--red); }
    .hist-orange{ color: var(--orange);} .hist-dot.hist-orange{ background: var(--orange);}
    .hist-label { font-size: 0.82rem; font-weight: 600; color: var(--black); }
    .hist-date  { font-size: 0.7rem; color: rgba(0,0,0,0.35); margin-top: 2px; }
    .hist-amount { font-size: 0.88rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .hist-amount .curr { font-size: 60%; color: rgba(0,0,0,0.35); font-weight: 500; }
    .hist-empty { padding: 22px 16px; text-align: center; font-size: 0.82rem; color: rgba(0,0,0,0.35); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(59,130,246,0.12);
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 0 16px;
      z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; text-decoration: none; flex: 1;
    }
    .nav-item svg { width: 22px; height: 22px; stroke: rgba(0,0,0,0.3); fill: none; stroke-width: 2; transition: stroke 0.2s; }
    .nav-item span { font-size: 0.65rem; font-weight: 600; color: rgba(0,0,0,0.3); transition: color 0.2s; letter-spacing: 0.3px; }
    .nav-item.active svg { stroke: var(--blue); }
    .nav-item.active span { color: var(--blue); }
  </style>
</head>
<body>
  <div class="deco-circle tl-1"></div>
  <div class="deco-circle tl-2"></div>
  <div class="deco-circle br-1"></div>
  <div class="deco-circle br-2"></div>

  <div class="page">
    <!-- HEADER -->
    <div class="header">
      <div>
        <div class="greeting" id="greeting-text">Bom dia</div>
        <div class="greeting-sub">Bem-vindo de volta</div>
      </div>
      <div class="notif-btn">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      </div>
    </div>

    <!-- BALANCE CARD -->
    <div class="balance-card">
      <div class="balance-label">Saldo Disponivel</div>
      <div class="balance-amount" style="color:#F59E0B;">
        <span id="bal-available">0,00</span><span class="curr-tag">AOA</span>
      </div>
      <div class="account-row">
        <span class="account-id-label">ID da Conta</span>
        <span class="account-id-num" id="account-id-val">—</span>
      </div>
      <div class="balance-sub-row">
        <div class="balance-sub">
          <div class="balance-sub-label">Depositado</div>
          <div class="balance-sub-val val-green"><span id="bal-deposited">0,00</span> <span style="font-size:60%;opacity:0.7;">AOA</span></div>
        </div>
        <div class="balance-sub">
          <div class="balance-sub-label">Levantado</div>
          <div class="balance-sub-val val-red"><span id="bal-withdrawn">0,00</span> <span style="font-size:60%;opacity:0.7;">AOA</span></div>
        </div>
      </div>
    </div>

    <!-- LIVE TICKER -->
    <div class="live-bar">
      <div id="live-ticker"><span class="ticker-dot"></span> A carregar...</div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-row">
      <div class="action-btn" onclick="window.location.href='finance.html?tab=deposit'">
        <div class="action-circle">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </div>
        <span class="action-label">Deposito</span>
      </div>
      <div class="action-btn" onclick="window.location.href='finance.html?tab=withdraw'">
        <div class="action-circle">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
        <span class="action-label">Transferencia</span>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="section-head">
      <div class="section-title">Ultimos Movimentos</div>
      <div class="section-link" onclick="window.location.href='history.html'">Ver todos</div>
    </div>
    <div class="history-card">
      <div id="history-list">
        <div class="hist-empty">A carregar movimentos...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Inicial</span>
    </a>
    <a class="nav-item" href="plans.html">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <span>Planos</span>
    </a>
    <a class="nav-item" href="plans.html#tasks">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <span>Tarefas</span>
    </a>
    <a class="nav-item" href="menu.html">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span>Menu</span>
    </a>
  </nav>

  <script>
    document.addEventListener('click', e => {
      const btn = e.target.closest('button, .action-circle, .nav-item');
      if (!btn) return;
      btn.style.transform = 'scale(0.96)';
      setTimeout(() => { btn.style.transform = ''; }, 150);
    });
  </script>
</body>
</html>
