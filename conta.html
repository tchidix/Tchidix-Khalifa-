<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExxonMobil — Conta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--navy:#0a1628;--blue:#1E6FBF;--blue2:#2a7fd4;--red:#c8102e;--white:#fff;--off:#f7f8fc;--g100:#eef0f5;--g300:#c2c8d8;--g500:#7a849a;--text:#0d1117;--green:#0a7c4b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;font-variant-numeric:normal;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--g100);display:flex;z-index:800;box-shadow:0 -4px 20px rgba(10,22,40,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:3px;cursor:pointer;border:none;background:none;}
.nav-item span{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.4px;text-transform:uppercase;}
.nav-item.active span{color:var(--red);}
.nav-item svg{color:var(--g500);}
.nav-item.active svg{color:var(--blue);}

.account-header{background:var(--navy);padding:20px 20px 0;position:relative;overflow:hidden;}
.account-header::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(30,111,191,.2) 0%,transparent 70%);border-radius:50%;}
.ah-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:2;}
.ah-title{color:#fff;font-size:18px;font-weight:700;}
.eye-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);}
.balance-section{position:relative;z-index:2;padding-bottom:20px;}
.balance-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.balance-value{font-size:30px;font-weight:700;font-family:'Space Mono';color:#fff;line-height:1;letter-spacing:-.5px;}
.balance-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px;}
.balances-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,.08);}
.bg-item{padding:12px;border-right:1px solid rgba(255,255,255,.08);}
.bg-item:last-child{border-right:none;}
.bg-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;}
.bg-val{font-size:15px;font-weight:700;font-family:'Space Mono';color:#fff;margin-top:3px;}
.bg-val.green{color:#4ade80;}

.section{padding:20px 20px 0;}
.chart-card{background:var(--white);border-radius:16px;border:1px solid var(--g100);padding:16px;}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.chart-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--g300);background:none;font-family:'DM Sans';font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;transition:.2s;}
.chart-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.chart-wrap{height:140px;}

.options-section{padding:20px 20px 0;}
.opt-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g500);margin-bottom:10px;}
.options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.opt-btn{background:var(--white);border-radius:14px;border:1px solid var(--g100);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:.15s;text-decoration:none;}
.opt-btn:active{transform:scale(.96);}
.opt-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.opt-label{font-size:11px;font-weight:700;color:var(--navy);text-align:center;text-transform:uppercase;letter-spacing:.3px;line-height:1.3;}
.opt-btn.danger .opt-label{color:var(--red);}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:1000;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="account-header">
  <div class="ah-top">
    <div class="ah-title">Minha Conta</div>
    <button class="eye-btn" onclick="toggleHide()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
    </button>
  </div>
  <div class="balance-section">
    <div class="balance-label">Saldo Disponivel</div>
    <div id="mainBalance" class="balance-value">Kz 0.00</div>
    <div class="balance-sub">Actualizado agora</div>
  </div>
  <div class="balances-grid">
    <div class="bg-item"><div class="bg-lbl">Ganhos</div><div class="bg-val green" id="gainsVal">0.00</div></div>
    <div class="bg-item"><div class="bg-lbl">Depositado</div><div class="bg-val" id="depositedVal">0.00</div></div>
    <div class="bg-item"><div class="bg-lbl">Bonus</div><div class="bg-val" id="bonusVal">0.00</div></div>
  </div>
</div>

<div class="section">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g500);margin-bottom:12px;">Historial de Ganhos</div>
  <div class="chart-card">
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchChart('7d',this)">7D</button>
      <button class="chart-tab" onclick="switchChart('30d',this)">30D</button>
      <button class="chart-tab" onclick="switchChart('all',this)">Tudo</button>
    </div>
    <div class="chart-wrap"><canvas id="gainsChart"></canvas></div>
  </div>
</div>

<!-- AREA FINANCEIRA -->
<div class="options-section">
  <div class="opt-section-title">Area Financeira</div>
  <div class="options-grid">
    <a href="deposito.html" class="opt-btn">
      <div class="opt-icon" style="background:#eff6ff;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#1E6FBF" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg></div>
      <span class="opt-label">Depositar</span>
    </a>
    <a href="levantamento.html" class="opt-btn">
      <div class="opt-icon" style="background:#fff0f2;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg></div>
      <span class="opt-label">Levantamento</span>
    </a>
    <a href="historico.html" class="opt-btn">
      <div class="opt-icon" style="background:#f0fdf4;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
      <span class="opt-label">Historico</span>
    </a>
  </div>
</div>

<!-- AREA COMERCIAL -->
<div class="options-section">
  <div class="opt-section-title">Area Comercial</div>
  <div class="options-grid">
    <a href="planos.html" class="opt-btn">
      <div class="opt-icon" style="background:#eff6ff;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#1E6FBF" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg></div>
      <span class="opt-label">Planos</span>
    </a>
    <a href="amigos.html" class="opt-btn">
      <div class="opt-icon" style="background:#fef9c3;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#92400e" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6 5.87a4 4 0 100-8 4 4 0 000 8zm6-10a4 4 0 10-8 0 4 4 0 008 0z"/></svg></div>
      <span class="opt-label">Amigos</span>
    </a>
    <a href="exxonmobil.html" class="opt-btn">
      <div class="opt-icon" style="background:#fff0f2;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg></div>
      <span class="opt-label">ExxonMobil</span>
    </a>
  </div>
</div>

<!-- SEGURANCA -->
<div class="options-section">
  <div class="opt-section-title">Seguranca e Conta</div>
  <div class="options-grid">
    <a href="seguranca.html" class="opt-btn">
      <div class="opt-icon" style="background:#eff6ff;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#1E6FBF" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></div>
      <span class="opt-label">Seguranca</span>
    </a>
    <a href="seguranca.html" class="opt-btn">
      <div class="opt-icon" style="background:#f0fdf4;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div>
      <span class="opt-label">Suporte</span>
    </a>
    <button class="opt-btn danger" onclick="confirmLogout()">
      <div class="opt-icon" style="background:#fff0f2;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></div>
      <span class="opt-label">Sair</span>
    </button>
  </div>
</div>

<!-- REFERRAL -->
<div class="options-section" style="padding-bottom:28px;">
  <div class="opt-section-title">O Meu Codigo de Convite</div>
  <div style="background:var(--white);border-radius:14px;border:1px solid var(--g100);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;">Codigo de Convite</div>
      <div style="font-size:20px;font-weight:700;font-family:'Space Mono';color:var(--navy);" id="refCodeDisplay">---</div>
    </div>
    <button onclick="copyRef()" style="background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans';font-size:13px;font-weight:700;cursor:pointer;">Copiar</button>
  </div>
</div>

<nav class="nav-bar">
  <button class="nav-item" onclick="window.location.href='index.html'">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span>Inicio</span>
  </button>
  <button class="nav-item" onclick="window.location.href='checkin.html'">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <span>Check In</span>
  </button>
  <button class="nav-item active">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    <span>Conta</span>
  </button>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",authDomain:"ascend-34bf0.firebaseapp.com",projectId:"ascend-34bf0",storageBucket:"ascend-34bf0.firebasestorage.app",messagingSenderId:"592623076677",appId:"1:592623076677:web:c5615719870aefdabf6a2c"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
let hidden=false;
let refCode='';
let balanceText='Kz 0.00';

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='auth.html';return;}
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists())return;
  const d=snap.data();
  balanceText='Kz '+(d.balance||0).toFixed(2);
  document.getElementById('mainBalance').textContent=balanceText;
  document.getElementById('gainsVal').textContent=(d.totalGains||0).toFixed(2);
  document.getElementById('depositedVal').textContent=(d.totalDeposited||0).toFixed(2);
  document.getElementById('bonusVal').textContent=(d.bonus||0).toFixed(2);
  refCode=d.referralCode||'';
  document.getElementById('refCodeDisplay').textContent=refCode||'---';
  buildChart('7d');
});

window.toggleHide=function(){
  hidden=!hidden;
  document.getElementById('mainBalance').textContent=hidden?'* * * * *':balanceText;
};
window.copyRef=function(){
  const link=window.location.origin+'/auth.html?ref='+refCode;
  navigator.clipboard.writeText(link);
  showToast('Link copiado');
};
window.confirmLogout=function(){
  if(confirm('Tem certeza que deseja sair?')){signOut(auth).then(()=>window.location.href='auth.html');}
};

let chartInst=null;
window.switchChart=function(p,btn){document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildChart(p);};
function buildChart(period){
  const ctx=document.getElementById('gainsChart').getContext('2d');
  if(chartInst)chartInst.destroy();
  let labels,data;
  if(period==='7d'){labels=['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];data=[250,500,250,750,500,1000,750];}
  else if(period==='30d'){labels=Array.from({length:30},(_,i)=>String(i+1));data=Array.from({length:30},()=>Math.floor(Math.random()*1500+200));}
  else{labels=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];data=[2000,4500,3800,6000,5200,7800,6500,9000,8200,11000,9800,13000];}
  chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:'#1E6FBF',backgroundColor:'rgba(30,111,191,.08)',borderWidth:2,fill:true,tension:.4,pointBackgroundColor:'#c8102e',pointRadius:3,pointHoverRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>'Kz '+v.raw}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#7a849a'}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#7a849a',callback:v=>'Kz '+v}}}}});
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
