<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExxonMobil — Conta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--navy:#0a1628;--navy2:#122040;--blue:#0d3a8e;--red:#c8102e;--white:#fff;--off:#f7f8fc;--g100:#eef0f5;--g300:#c2c8d8;--g500:#7a849a;--text:#0d1117;--green:#0a7c4b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--g100);display:flex;z-index:800;box-shadow:0 -4px 20px rgba(10,22,40,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:3px;cursor:pointer;border:none;background:none;}
.nav-item span{font-size:10px;font-weight:600;color:var(--g500);letter-spacing:.4px;text-transform:uppercase;}
.nav-item.active span{color:var(--red);}
.nav-item svg{color:var(--g500);}
.nav-item.active svg{color:var(--navy);}

/* HEADER CARD */
.account-header{background:var(--navy);padding:20px 20px 0;position:relative;overflow:hidden;}
.account-header::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(200,16,46,.18) 0%,transparent 70%);border-radius:50%;}
.ah-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:relative;z-index:2;}
.ah-title{color:#fff;font-size:18px;font-weight:700;}
.eye-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);}

.balance-section{position:relative;z-index:2;padding-bottom:24px;}
.balance-row{display:flex;flex-direction:column;gap:16px;}
.balance-item{}
.balance-label{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.balance-value{font-size:28px;font-weight:700;font-family:'Space Mono';color:#fff;line-height:1;}
.balance-value.hidden-val::after{content:'••••••';font-size:22px;}
.balance-value.hidden-val .val-text{display:none;}
.balance-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;}
.balance-divider{width:1px;background:rgba(255,255,255,.1);height:40px;align-self:center;display:none;}

.balances-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-top:1px solid rgba(255,255,255,.08);}
.bg-item{padding:14px 12px;border-right:1px solid rgba(255,255,255,.08);}
.bg-item:last-child{border-right:none;}
.bg-lbl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;}
.bg-val{font-size:14px;font-weight:700;font-family:'Space Mono';color:#fff;margin-top:3px;}
.bg-val.green{color:#4ade80;}
.bg-val.red{color:#f87171;}

/* CHART SECTION */
.section{padding:20px 20px 0;}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

.chart-card{background:var(--white);border-radius:16px;border:1px solid var(--g100);padding:16px;overflow:hidden;}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.chart-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--g300);background:none;font-family:'DM Sans';font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;transition:.2s;}
.chart-tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.chart-wrap{height:150px;position:relative;}

/* QUICK ACTIONS */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.quick-btn{background:var(--white);border-radius:14px;border:1px solid var(--g100);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:.2s;text-decoration:none;}
.quick-btn:active{transform:scale(.96);}
.quick-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.quick-label{font-size:10px;font-weight:700;color:var(--navy);text-align:center;text-transform:uppercase;letter-spacing:.4px;}

/* INFO ROWS */
.info-card{background:var(--white);border-radius:14px;border:1px solid var(--g100);overflow:hidden;}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--g100);}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:13px;color:var(--g500);}
.info-val{font-size:13px;font-weight:700;color:var(--navy);}
.info-val.green{color:var(--green);}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--blue);font-size:12px;font-weight:600;padding:4px 8px;border-radius:6px;background:var(--g100);}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:1000;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="account-header">
  <div class="ah-top">
    <div class="ah-title">Minha Conta</div>
    <button class="eye-btn" id="eyeBtn" onclick="toggleHide()">
      <svg id="eyeIcon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
    </button>
  </div>

  <div class="balance-section">
    <div class="balance-label">Saldo Disponível</div>
    <div class="balance-value" id="mainBalance"><span class="val-text" id="balanceText">Kz 0.00</span></div>
    <div class="balance-sub">Actualizado agora</div>
  </div>

  <div class="balances-grid">
    <div class="bg-item">
      <div class="bg-lbl">Ganhos</div>
      <div class="bg-val green" id="gainsVal">0.00</div>
    </div>
    <div class="bg-item">
      <div class="bg-lbl">Depositado</div>
      <div class="bg-val" id="depositedVal">0.00</div>
    </div>
    <div class="bg-item">
      <div class="bg-lbl">Bónus</div>
      <div class="bg-val red" id="bonusVal">0.00</div>
    </div>
  </div>
</div>

<!-- CHART -->
<div class="section">
  <div class="section-title">Historial de Ganhos</div>
  <div class="chart-card">
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchChart('7d',this)">7D</button>
      <button class="chart-tab" onclick="switchChart('30d',this)">30D</button>
      <button class="chart-tab" onclick="switchChart('all',this)">Tudo</button>
    </div>
    <div class="chart-wrap">
      <canvas id="gainsChart"></canvas>
    </div>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="section">
  <div class="section-title">Acções Rápidas</div>
  <div class="quick-grid">
    <a href="deposito.html" class="quick-btn">
      <div class="quick-icon" style="background:#eff6ff;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#0d3a8e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </div>
      <span class="quick-label">Depositar</span>
    </a>
    <a href="levantamento.html" class="quick-btn">
      <div class="quick-icon" style="background:#fff0f2;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
      <span class="quick-label">Levantar</span>
    </a>
    <a href="historico.html" class="quick-btn">
      <div class="quick-icon" style="background:#f0fdf4;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <span class="quick-label">Histórico</span>
    </a>
    <a href="seguranca.html" class="quick-btn">
      <div class="quick-icon" style="background:#fef9c3;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#92400e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <span class="quick-label">Segurança</span>
    </a>
  </div>
</div>

<!-- ACCOUNT INFO -->
<div class="section" style="padding-bottom:24px;">
  <div class="section-title">Informações da Conta</div>
  <div class="info-card">
    <div class="info-row">
      <span class="info-key">Nome Completo</span>
      <span class="info-val" id="infoName">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Telefone</span>
      <span class="info-val" id="infoPhone">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">Plano Activo</span>
      <span class="info-val green" id="infoPlan">Sem plano</span>
    </div>
    <div class="info-row">
      <span class="info-key">Código de Convite</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="info-val" id="infoRef">—</span>
        <button class="copy-btn" onclick="copyRef()">Copiar</button>
      </div>
    </div>
    <div class="info-row">
      <span class="info-key">Membro desde</span>
      <span class="info-val" id="infoDate">—</span>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav-bar">
  <button class="nav-item" onclick="window.location.href='index.html'">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span>Início</span>
  </button>
  <button class="nav-item" onclick="window.location.href='checkin.html'">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <span>Check In</span>
  </button>
  <button class="nav-item active" onclick="window.location.href='conta.html'">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    <span>Conta</span>
  </button>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",authDomain:"ascend-34bf0.firebaseapp.com",projectId:"ascend-34bf0",storageBucket:"ascend-34bf0.firebasestorage.app",messagingSenderId:"592623076677",appId:"1:592623076677:web:c5615719870aefdabf6a2c"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
let refCode='';
let hidden=false;

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='auth.html';return;}
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists())return;
  const d=snap.data();
  document.getElementById('balanceText').textContent='Kz '+(d.balance||0).toFixed(2);
  document.getElementById('gainsVal').textContent=(d.totalGains||0).toFixed(2);
  document.getElementById('depositedVal').textContent=(d.totalDeposited||0).toFixed(2);
  document.getElementById('bonusVal').textContent=(d.bonus||0).toFixed(2);
  document.getElementById('infoName').textContent=d.fullName||'—';
  document.getElementById('infoPhone').textContent=d.phone||'—';
  document.getElementById('infoPlan').textContent=d.activePlan?'Kz '+d.activePlan.amount:'Sem plano';
  refCode=d.referralCode||'';
  document.getElementById('infoRef').textContent=refCode;
  if(d.createdAt){
    const dt=d.createdAt.toDate?d.createdAt.toDate():new Date(d.createdAt);
    document.getElementById('infoDate').textContent=dt.toLocaleDateString('pt-AO');
  }
  buildChart('7d');
});

window.toggleHide=function(){
  hidden=!hidden;
  const bv=document.getElementById('mainBalance');
  const vt=document.getElementById('balanceText');
  if(hidden){bv.classList.add('hidden-val');}
  else{bv.classList.remove('hidden-val');}
};

window.copyRef=function(){
  const link=window.location.origin+'/auth.html?ref='+refCode;
  navigator.clipboard.writeText(link);
  showToast('🔗 Link copiado!');
};

let chartInstance=null;
window.switchChart=function(period,btn){
  document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(period);
};

function buildChart(period){
  const ctx=document.getElementById('gainsChart').getContext('2d');
  if(chartInstance)chartInstance.destroy();
  let labels,data;
  if(period==='7d'){
    labels=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    data=[250,500,250,750,500,1000,750];
  }else if(period==='30d'){
    labels=Array.from({length:30},(_,i)=>i+1+'');
    data=Array.from({length:30},()=>Math.floor(Math.random()*1500+200));
  }else{
    labels=Array.from({length:12},(_,i)=>['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][i]);
    data=[2000,4500,3800,6000,5200,7800,6500,9000,8200,11000,9800,13000];
  }
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        data,
        borderColor:'#0a1628',
        backgroundColor:'rgba(10,22,40,.06)',
        borderWidth:2,
        fill:true,
        tension:.4,
        pointBackgroundColor:'#c8102e',
        pointRadius:3,
        pointHoverRadius:5
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>'Kz '+v.raw.toFixed(2)}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:'#7a849a'}},
        y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#7a849a',callback:v=>'Kz '+v}}
      }
    }
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
