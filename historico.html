<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora Meta — Historico</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",
      authDomain: "pinnacle-finance-b2626.firebaseapp.com",
      projectId: "pinnacle-finance-b2626",
      storageBucket: "pinnacle-finance-b2626.firebasestorage.app",
      messagingSenderId: "1032490368286",
      appId: "1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "auth.html"; return; }

      const movQ = query(collection(db, "users", user.uid, "movimentos"), orderBy("data", "desc"));
      const movSnap = await getDocs(movQ);

      const lista = document.getElementById("hist-lista");
      lista.innerHTML = "";

      if (movSnap.empty) {
        lista.innerHTML = `<div class="empty-msg">Sem movimentos registados.</div>`;
        return;
      }

      let lastMonth = "";
      movSnap.forEach(d => {
        const m = d.data();
        const date = m.data?.toDate ? m.data.toDate() : new Date();
        const month = date.toLocaleDateString("pt-AO", { month: "long", year: "numeric" });

        if (month !== lastMonth) {
          const sep = document.createElement("div");
          sep.className = "month-sep";
          sep.textContent = capitalize(month);
          lista.appendChild(sep);
          lastMonth = month;
        }

        lista.appendChild(buildItem(m, date));
      });
    });

    function buildItem(m, date) {
      const div = document.createElement("div");
      div.className = "mov-item";

      const tipo = (m.tipo || "").toLowerCase();
      let colorClass = "mov-orange";
      if (["deposito","bonus","rendimento","comissao"].includes(tipo)) colorClass = "mov-green";
      if (["levantamento","retirada","investimento"].includes(tipo)) colorClass = "mov-red";

      const sinal = colorClass === "mov-red" ? "-" : "+";
      const dataStr = date.toLocaleDateString("pt-AO", { day: "2-digit", month: "2-digit", year: "numeric" });
      const horaStr = date.toLocaleTimeString("pt-AO", { hour: "2-digit", minute: "2-digit" });

      const statusBadge = m.status === "pendente"
        ? `<span class="status-badge pending">Pendente</span>` : "";

      div.innerHTML = `
        <div class="mov-icon ${colorClass}-bg">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            ${colorClass === "mov-red"
              ? `<path d="M12 19V5M5 12l7-7 7 7"/>`
              : `<path d="M12 5v14M5 12l7 7 7-7"/>`}
          </svg>
        </div>
        <div class="mov-mid">
          <div class="mov-desc">${m.descricao || capitalize(m.tipo)} ${statusBadge}</div>
          <div class="mov-date">${dataStr} — ${horaStr}</div>
        </div>
        <div class="mov-val ${colorClass}">${sinal} ${formatVal(m.valor || 0)} Kz</div>
      `;
      return div;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }
    function formatVal(v) { return Number(v).toLocaleString("pt-AO", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F97316; --green: #16A34A; --red: #DC2626; --blue: #1D4ED8;
      --black: #111111; --gray: #6B7280; --gray-light: #F3F4F6; --border: #E5E7EB;
      --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--font); background: #fff; color: var(--black); overflow-y: auto; overflow-x: hidden; min-height: 100vh; padding-bottom: 40px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 0% 0%, rgba(249,115,22,0.09) 0%, transparent 55%), radial-gradient(ellipse at 100% 100%, rgba(249,115,22,0.08) 0%, transparent 55%); pointer-events: none; z-index: 0; }
    .deco-circle { position: fixed; border-radius: 50%; border: 1.5px solid rgba(249,115,22,0.16); background: transparent; pointer-events: none; z-index: 0; }
    .dc1 { width: 420px; height: 420px; top: -140px; left: -140px; }
    .dc2 { width: 280px; height: 280px; top: -60px; left: -60px; border-color: rgba(249,115,22,0.12); }
    .dc3 { width: 360px; height: 360px; bottom: -120px; right: -120px; }
    .dc4 { width: 200px; height: 200px; bottom: -50px; right: -50px; border-color: rgba(249,115,22,0.13); }

    .page-wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 20px; }

    .back-link { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--gray); text-decoration: none; margin-bottom: 20px; }
    .back-link svg { width: 16px; height: 16px; stroke: var(--gray); fill: none; stroke-width: 2; }

    .page-title { font-size: 22px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--gray); margin-bottom: 20px; }

    .month-sep {
      font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase;
      letter-spacing: 0.7px; padding: 14px 0 6px;
    }

    .mov-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--border);
    }
    .mov-item:last-child { border-bottom: none; }

    .mov-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .mov-icon svg { width: 16px; height: 16px; }
    .mov-green-bg { background: rgba(22,163,74,0.1); }
    .mov-green-bg svg { stroke: var(--green); }
    .mov-red-bg { background: rgba(220,38,38,0.08); }
    .mov-red-bg svg { stroke: var(--red); }
    .mov-orange-bg { background: rgba(249,115,22,0.1); }
    .mov-orange-bg svg { stroke: var(--orange); }

    .mov-mid { flex: 1; min-width: 0; }
    .mov-desc { font-size: 13px; font-weight: 600; color: var(--black); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .mov-date { font-size: 11px; color: var(--gray); margin-top: 2px; font-family: var(--mono); }
    .mov-val { font-size: 14px; font-weight: 700; font-family: var(--mono); white-space: nowrap; }
    .mov-green { color: var(--green); }
    .mov-red { color: var(--red); }
    .mov-orange { color: var(--orange); }

    .status-badge { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; }
    .status-badge.pending { background: rgba(249,115,22,0.12); color: var(--orange); }

    .empty-msg { text-align: center; padding: 40px 0; font-size: 13px; color: var(--gray); }
  </style>
</head>
<body>

  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>
  <div class="deco-circle dc4"></div>

  <div class="page-wrap">

    <a class="back-link" href="javascript:history.back()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Voltar
    </a>

    <div class="page-title">Historico</div>
    <div class="page-sub">Todos os movimentos da sua conta</div>

    <div id="hist-lista">
      <div class="empty-msg">A carregar...</div>
    </div>

  </div>

</body>
</html>
