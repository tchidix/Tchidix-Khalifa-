<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaixepa SA - Ganhos</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #2c4a8a;
      --navy-mid: #3a5fa0;
      --navy-light: #4a72b5;
      --orange: #f57c00;
      --white: #ffffff;
      --off-white: #F5F8FF;
      --text-dark: #0D1F3C;
      --text-muted: #6B7FA3;
      --border: #D6E4FF;
      --success: #2e7d32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text-dark); overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse 70% 40% at 0% 0%, rgba(44,74,138,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 100% 80%, rgba(58,95,160,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--navy), var(--navy-mid), var(--navy-light), var(--navy)); z-index: 200; }

    .header {
      position: fixed; top: 3px; left: 0; right: 0; height: 56px;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
      box-shadow: 0 2px 12px rgba(44,74,138,0.06);
    }
    .btn-back { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-back svg { width: 18px; height: 18px; fill: none; stroke: var(--navy); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-dark); }
    .header-badge { margin-left: auto; background: #E8F0FE; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; color: var(--navy-mid); }

    .main { position: relative; z-index: 1; padding: 75px 16px 16px; }

    /* ── No invest ── */
    .no-invest-wrap { animation: fadeUp 0.4s ease; }
    .no-invest-hero { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border-radius: 20px; padding: 28px 20px; text-align: center; margin-bottom: 16px; position: relative; overflow: hidden; }
    .no-invest-hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 110px; height: 110px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .ni-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.12); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .ni-icon svg { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 1.8; }
    .ni-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; color: white; margin-bottom: 8px; }
    .ni-sub { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 20px; }
    .btn-start { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px; background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; text-decoration: none; }
    .btn-start svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; }
    .how-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .how-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 12px; }
    .how-card-icon { width: 36px; height: 36px; border-radius: 10px; background: #E8F0FE; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .how-card-icon svg { width: 18px; height: 18px; fill: none; stroke: var(--navy-mid); stroke-width: 1.8; }
    .how-card-title { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
    .how-card-sub { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    /* ── Plan hero ── */
    .longo-wrap, .curto-wrap { animation: fadeUp 0.4s ease; }

    .plan-hero, .curto-hero {
      border-radius: 20px; padding: 20px; margin-bottom: 14px; position: relative; overflow: hidden;
    }
    .plan-hero { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%); }
    .curto-hero { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, #6b4fa0 100%); }
    .plan-hero::before, .curto-hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.05); }

    .ph-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .ph-name { font-family: 'Sora', sans-serif; font-size: 19px; font-weight: 800; color: white; }
    .ph-badge { background: rgba(110,231,183,0.2); border: 1px solid rgba(110,231,183,0.4); border-radius: 20px; padding: 4px 12px; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; color: #6ee7b7; }
    .ph-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .ph-stat { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 8px; text-align: center; }
    .ph-stat-lbl { font-size: 10px; color: rgba(255,255,255,0.6); margin-bottom: 3px; }

    /* Capital = vermelho | Diario = verde | Saldo actual = laranja */
    .ph-stat-val         { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: #ff4444; }
    .ph-stat-val.green   { color: #6ee7b7; }
    .ph-stat-val.orange  { color: #fdba74; }

    /* Countdown card — compacto */
    .cd-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
    .cd-card-head, .curto-cd-head, .parcelas-head, .chart-card-head { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); padding: 10px 14px; }
    .cd-card-head-title, .curto-cd-title, .parcelas-head-title, .chart-card-head-title { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; color: white; }
    .cd-card-head-sub, .curto-cd-sub, .parcelas-head-sub, .chart-card-head-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .cd-body { padding: 12px 14px; }
    .cd-display { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 10px; }
    .cd-unit { text-align: center; flex: 1; }
    .cd-num { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); background: var(--off-white); border-radius: 8px; padding: 6px 4px; line-height: 1; display: block; }
    .cd-lbl { font-size: 9px; font-weight: 600; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
    .cd-sep { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-muted); padding-bottom: 10px; }
    .prog-wrap { margin-bottom: 10px; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .prog-bar { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--navy), var(--navy-light)); border-radius: 4px; transition: width 1s ease; }
    .ganho-status { text-align: center; padding: 7px; border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; }
    .ganho-status.pronto { background: #e8f5e9; color: var(--success); }
    .ganho-status.aguardar { background: #E8F0FE; color: var(--navy-mid); }
    .btn-resgatar { width: 100%; padding: 11px; background: linear-gradient(135deg, #00c853, #00e676); color: white; border: none; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; display: none; }
    .btn-resgatar.show { display: block; }

    /* Chart */
    .chart-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
    .chart-body { padding: 16px; }
    .chart-total { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .chart-total-label { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    canvas { display: block; width: 100% !important; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; }
    .stat-card-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .stat-card-icon.blue { background: #E8F0FE; }
    .stat-card-icon.green { background: #dcfce7; }
    .stat-card-icon.orange { background: #fff3e0; }
    .stat-card-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .stat-card-icon.blue svg { stroke: var(--navy-mid); }
    .stat-card-icon.green svg { stroke: var(--success); }
    .stat-card-icon.orange svg { stroke: var(--orange); }
    .stat-card-val { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .stat-card-lbl { font-size: 11px; color: var(--text-muted); }

    /* Curto */
    .curto-cd-card, .parcelas-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
    .curto-cd-body, .parcelas-body { padding: 16px; }

    .timeline { position: relative; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 18px; }
    .tl-item:last-child { margin-bottom: 0; }
    .tl-dot { position: absolute; left: -22px; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: white; z-index: 1; }
    .tl-dot.done { background: var(--success); border-color: var(--success); }
    .tl-dot.active { background: var(--navy-mid); border-color: var(--navy-mid); box-shadow: 0 0 0 4px rgba(58,95,160,0.15); }
    .tl-content { background: var(--off-white); border-radius: 12px; padding: 12px 14px; }
    .tl-content.done { background: #f0fdf4; border: 1px solid #a7f3d0; }
    .tl-content.active { background: #E8F0FE; border: 1px solid var(--border); }
    .tl-title { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
    .tl-sub { font-size: 12px; color: var(--text-muted); }
    .tl-val { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); margin-top: 6px; }
    .tl-val.green { color: var(--success); }
    .tl-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-top: 4px; }
    .tl-badge.done { background: #dcfce7; color: var(--success); }
    .tl-badge.active { background: #E8F0FE; color: var(--navy-mid); }
    .tl-badge.pending { background: #f1f5f9; color: var(--text-muted); }

    .arc-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; position: relative; }
    .arc-svg { width: 140px; height: 80px; overflow: visible; }
    .arc-label { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
    .arc-days { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
    .arc-days-num { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); }
    .arc-days-lbl { font-size: 11px; color: var(--text-muted); }

    .curto-info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .curto-info-box { background: var(--off-white); border-radius: 12px; padding: 12px; text-align: center; }
    .curto-info-lbl { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .curto-info-val { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); }
    .curto-info-val.orange { color: var(--orange); }

    /* Spinner */
    .spinner-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .spinner-overlay.show { opacity: 1; pointer-events: all; }
    .spinner-ring { width: 52px; height: 52px; border: 3px solid var(--border); border-top-color: var(--navy-mid); border-radius: 50%; animation: spin 0.75s linear infinite; }
    .spinner-text { margin-top: 14px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: var(--navy); }

    /* Modal compacto */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-sheet { width: 100%; max-width: 480px; background: white; border-radius: 20px 20px 0 0; padding: 16px 20px 28px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
    .modal-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .modal-icon.success { background: #e8f5e9; }
    .modal-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 6px; }
    .modal-msg { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.5; margin-bottom: 12px; }
    .modal-amount { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 14px; }
    .modal-amount-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .modal-amount-val { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: var(--success); }
    .btn-modal-close { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); color: white; border: none; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="top-bar"></div>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-ring"></div>
  <div class="spinner-text">A carregar...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-icon success">
      <svg viewBox="0 0 24 24" stroke="#2e7d32"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="modal-title">Ganho creditado!</div>
    <div class="modal-msg">O seu ganho diario foi creditado com sucesso na sua conta.</div>
    <div class="modal-amount">
      <div class="modal-amount-label">Valor creditado</div>
      <div class="modal-amount-val" id="modalAmountVal">-- Kz</div>
    </div>
    <button class="btn-modal-close" onclick="closeModal()">Fechar</button>
  </div>
</div>

<div class="header">
  <button class="btn-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="header-title">Ganhos</span>
  <div class="header-badge" id="headerBadge" style="display:none"></div>
</div>

<div class="main" id="mainContent"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",
    authDomain: "ascend-34bf0.firebaseapp.com",
    projectId: "ascend-34bf0",
    storageBucket: "ascend-34bf0.firebasestorage.app",
    messagingSenderId: "592623076677",
    appId: "1:592623076677:web:c5615719870aefdabf6a2c"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);
  let cdInterval = null;
  let currentUser = null;
  let userData = null;

  function fmt(n) { return (n || 0).toLocaleString('pt-AO') + ' Kz'; }
  function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }

  function renderSemInvestimento() {
    document.getElementById('mainContent').innerHTML = `
      <div class="no-invest-wrap">
        <div class="no-invest-hero">
          <div class="ni-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
          <div class="ni-title">Comece a ganhar hoje</div>
          <div class="ni-sub">Adquira um plano de investimento e acompanhe os seus ganhos aqui em tempo real.</div>
          <a class="btn-start" href="compra.html"><svg viewBox="0 0 24 24"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>Ver planos</a>
        </div>
        <div class="how-cards">
          <div class="how-card"><div class="how-card-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div class="how-card-title">Ganhos Diarios</div><div class="how-card-sub">Receba rendimentos todos os dias na sua conta</div></div>
          <div class="how-card"><div class="how-card-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="how-card-title">Fundo Garantido</div><div class="how-card-sub">Capital respaldado pela actividade mineira</div></div>
          <div class="how-card"><div class="how-card-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="how-card-title">Alto Retorno</div><div class="how-card-sub">Ate 3x o valor investido em 50 dias</div></div>
          <div class="how-card"><div class="how-card-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div><div class="how-card-title">Referencias</div><div class="how-card-sub">10% de comissao por cada amigo</div></div>
        </div>
      </div>`;
  }

  function renderLongoPrazo(inv) {
    document.getElementById('headerBadge').textContent = 'Longo Prazo';
    document.getElementById('headerBadge').style.display = 'block';
    const t7 = inv.diario * 7, t30 = inv.diario * 30;
    document.getElementById('mainContent').innerHTML = `
      <div class="longo-wrap">
        <div class="plan-hero">
          <div class="ph-top"><div class="ph-name">${inv.nome}</div><div class="ph-badge">Activo</div></div>
          <div class="ph-stats">
            <div class="ph-stat"><div class="ph-stat-lbl">Capital</div><div class="ph-stat-val">${fmt(inv.valor)}</div></div>
            <div class="ph-stat"><div class="ph-stat-lbl">Diario</div><div class="ph-stat-val green">${fmt(inv.diario)}</div></div>
            <div class="ph-stat"><div class="ph-stat-lbl">Saldo actual</div><div class="ph-stat-val orange">${fmt(userData.saldo)}</div></div>
          </div>
        </div>
        <div class="cd-card">
          <div class="cd-card-head"><div class="cd-card-head-title">Proximo ganho</div><div class="cd-card-head-sub">Contagem regressiva do ciclo diario de 24h</div></div>
          <div class="cd-body">
            <div class="cd-display">
              <div class="cd-unit"><span class="cd-num" id="cdH">00</span><div class="cd-lbl">Horas</div></div>
              <div class="cd-sep">:</div>
              <div class="cd-unit"><span class="cd-num" id="cdM">00</span><div class="cd-lbl">Min</div></div>
              <div class="cd-sep">:</div>
              <div class="cd-unit"><span class="cd-num" id="cdS">00</span><div class="cd-lbl">Seg</div></div>
            </div>
            <div class="prog-wrap">
              <div class="prog-labels"><span>Inicio</span><span id="progPct">0%</span></div>
              <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
            </div>
            <div class="ganho-status aguardar" id="ganhoStatus">A aguardar o proximo ganho diario...</div>
            <button class="btn-resgatar" id="btnResgatar" onclick="resgatarGanho()">Resgatar ${fmt(inv.diario)} agora</button>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-card-icon blue"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="stat-card-val">${fmt(t7)}</div><div class="stat-card-lbl">Estimativa 7 dias</div></div>
          <div class="stat-card"><div class="stat-card-icon green"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="stat-card-val">${fmt(t30)}</div><div class="stat-card-lbl">Estimativa 30 dias</div></div>
        </div>
        <div class="chart-card">
          <div class="cd-card-head"><div class="cd-card-head-title">Projecao de crescimento</div><div class="cd-card-head-sub">Evolucao estimada nos proximos 14 dias</div></div>
          <div class="chart-body">
            <div class="chart-total">${fmt((userData.saldo||0)+t30)}</div>
            <div class="chart-total-label">Saldo estimado em 30 dias</div>
            <canvas id="chartLongo" height="130"></canvas>
          </div>
        </div>
      </div>`;
    iniciarContagem(inv);
    setTimeout(() => renderChartLongo(inv), 100);
  }

  function renderChartLongo(inv) {
    const canvas = document.getElementById('chartLongo'); if (!canvas) return;
    const ctx = canvas.getContext('2d'), W = canvas.offsetWidth, H = 130;
    canvas.width = W*devicePixelRatio; canvas.height = H*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio);
    const days=14, base=userData.saldo||0;
    const pts = Array.from({length:days+1},(_,i)=>base+inv.diario*i);
    const max=Math.max(...pts),min=Math.min(...pts),range=max-min||1;
    const p={t:10,r:10,b:28,l:10},w=W-p.l-p.r,h=H-p.t-p.b;
    const px=i=>p.l+(i/days)*w, py=v=>p.t+h-((v-min)/range)*h;
    const grad=ctx.createLinearGradient(0,p.t,0,p.t+h);
    grad.addColorStop(0,'rgba(58,95,160,0.22)'); grad.addColorStop(1,'rgba(58,95,160,0)');
    ctx.beginPath(); ctx.moveTo(px(0),py(pts[0]));
    for(let i=1;i<=days;i++) ctx.lineTo(px(i),py(pts[i]));
    ctx.lineTo(px(days),H-p.b); ctx.lineTo(px(0),H-p.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0),py(pts[0]));
    for(let i=1;i<=days;i++) ctx.lineTo(px(i),py(pts[i]));
    ctx.strokeStyle='#3a5fa0'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
    [0,7,14].forEach(i=>{ctx.beginPath();ctx.arc(px(i),py(pts[i]),4,0,Math.PI*2);ctx.fillStyle='#3a5fa0';ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();});
    ctx.fillStyle='#6B7FA3'; ctx.font='10px DM Sans'; ctx.textAlign='center';
    [0,7,14].forEach(i=>ctx.fillText(`Dia ${i}`,px(i),H-8));
  }

  function renderCurtoPrazo(inv) {
    document.getElementById('headerBadge').textContent = 'Curto Prazo';
    document.getElementById('headerBadge').style.display = 'block';
    const agora=Date.now();
    const inicio=inv.iniciadoEm?(inv.iniciadoEm.toMillis?inv.iniciadoEm.toMillis():Number(inv.iniciadoEm)):agora;
    const diasPassados=Math.floor((agora-inicio)/86400000);
    const totalDias=inv.dias||50;
    const diasRestantes=Math.max(0,totalDias-diasPassados);
    const pctGeral=Math.min(100,(diasPassados/totalDias)*100);
    const dia25ts=inicio+25*86400000, dia50ts=inicio+50*86400000;
    const p1=agora>=dia25ts, p2=agora>=dia50ts;
    const pNum=p1?2:1;
    const proxTs=p1?dia50ts:dia25ts;
    const restMs=Math.max(0,proxTs-agora);
    const dAte=Math.floor(restMs/86400000), hAte=Math.floor((restMs%86400000)/3600000);
    document.getElementById('mainContent').innerHTML = `
      <div class="curto-wrap">
        <div class="curto-hero">
          <div class="ph-top"><div class="ph-name">${inv.nome}</div><div class="ph-badge">Activo</div></div>
          <div class="ph-stats">
            <div class="ph-stat"><div class="ph-stat-lbl">Investido</div><div class="ph-stat-val">${fmt(inv.valor)}</div></div>
            <div class="ph-stat"><div class="ph-stat-lbl">Retorno/parcela</div><div class="ph-stat-val green">${fmt(inv.retorno25||0)}</div></div>
            <div class="ph-stat"><div class="ph-stat-lbl">Total 50d</div><div class="ph-stat-val orange">${fmt(inv.retornoTotal||0)}</div></div>
          </div>
        </div>
        <div class="curto-cd-card">
          <div class="curto-cd-head"><div class="curto-cd-title">Progresso do investimento</div><div class="curto-cd-sub">Duracao total: 50 dias — pagamento em 2 parcelas</div></div>
          <div class="curto-cd-body">
            <div class="arc-wrap">
              <svg class="arc-svg" viewBox="0 0 140 80">
                <path d="M 10 75 A 60 60 0 0 1 130 75" fill="none" stroke="#D6E4FF" stroke-width="10" stroke-linecap="round"/>
                <path d="M 10 75 A 60 60 0 0 1 130 75" fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="${188.5-(pctGeral/100)*188.5}"/>
                <defs><linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2c4a8a"/><stop offset="100%" stop-color="#4a72b5"/></linearGradient></defs>
              </svg>
              <div class="arc-days" style="top:28px"><div class="arc-days-num">${diasPassados}</div><div class="arc-days-lbl">de ${totalDias} dias</div></div>
              <div class="arc-label">${pctGeral.toFixed(0)}% concluido</div>
            </div>
            <div class="curto-info-row">
              <div class="curto-info-box"><div class="curto-info-lbl">Dias restantes</div><div class="curto-info-val">${diasRestantes} dias</div></div>
              <div class="curto-info-box"><div class="curto-info-lbl">Proxima parcela em</div><div class="curto-info-val orange">${dAte}d ${hAte}h</div></div>
            </div>
          </div>
        </div>
        <div class="parcelas-card">
          <div class="parcelas-head"><div class="parcelas-head-title">Calendario de pagamentos</div><div class="parcelas-head-sub">2 parcelas ao longo de 50 dias</div></div>
          <div class="parcelas-body">
            <div class="timeline">
              <div class="tl-item">
                <div class="tl-dot ${p1?'done':(pNum===1?'active':'pending')}"></div>
                <div class="tl-content ${p1?'done':(pNum===1?'active':'')}">
                  <div class="tl-title">1.ª Parcela — Dia 25</div>
                  <div class="tl-sub">${p1?'Paga em '+new Date(dia25ts).toLocaleDateString('pt-PT'):'Prevista para '+new Date(dia25ts).toLocaleDateString('pt-PT')}</div>
                  <div class="tl-val ${p1?'green':''}">${fmt(inv.retorno25||0)}</div>
                  <div class="tl-badge ${p1?'done':(pNum===1?'active':'pending')}">${p1?'Pago':(pNum===1?'A aguardar':'Pendente')}</div>
                </div>
              </div>
              <div class="tl-item">
                <div class="tl-dot ${p2?'done':(pNum===2?'active':'pending')}"></div>
                <div class="tl-content ${p2?'done':(pNum===2?'active':'')}">
                  <div class="tl-title">2.ª Parcela — Dia 50</div>
                  <div class="tl-sub">${p2?'Paga em '+new Date(dia50ts).toLocaleDateString('pt-PT'):'Prevista para '+new Date(dia50ts).toLocaleDateString('pt-PT')}</div>
                  <div class="tl-val ${p2?'green':''}">${fmt(inv.retorno25||0)}</div>
                  <div class="tl-badge ${p2?'done':(pNum===2?'active':'pending')}">${p2?'Pago':(pNum===2?'A aguardar':'Pendente')}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="chart-card">
          <div class="cd-card-head"><div class="cd-card-head-title">Evolucao do retorno</div><div class="cd-card-head-sub">Crescimento ao longo dos 50 dias</div></div>
          <div class="chart-body">
            <div class="chart-total">${fmt(inv.retornoTotal||0)}</div>
            <div class="chart-total-label">Retorno total estimado</div>
            <canvas id="chartCurto" height="130"></canvas>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-card-icon orange"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="stat-card-val">${((((inv.retornoTotal||0)/(inv.valor||1))-1)*100).toFixed(0)}%</div><div class="stat-card-lbl">Rendimento total</div></div>
          <div class="stat-card"><div class="stat-card-icon blue"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-card-val">${diasRestantes}d</div><div class="stat-card-lbl">Dias restantes</div></div>
        </div>
      </div>`;
    setTimeout(()=>renderChartCurto(inv,inicio),100);
  }

  function renderChartCurto(inv,inicio){
    const canvas=document.getElementById('chartCurto'); if(!canvas)return;
    const ctx=canvas.getContext('2d'),W=canvas.offsetWidth,H=130;
    canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio);
    const agora=Date.now(),dp=Math.min(50,Math.floor((agora-inicio)/86400000));
    const cps=[{x:0,y:0},{x:25,y:inv.retorno25||0},{x:50,y:inv.retornoTotal||0}];
    const all=Array.from({length:51},(_,i)=>i<=25?{x:i,y:((inv.retorno25||0)/25)*i}:{x:i,y:(inv.retorno25||0)+(((inv.retornoTotal||0)-(inv.retorno25||0))/25)*(i-25)});
    const max=inv.retornoTotal||1,pc={t:10,r:10,b:28,l:10},w=W-pc.l-pc.r,h=H-pc.t-pc.b;
    const px=i=>pc.l+(i/50)*w,py=v=>pc.t+h-(v/max)*h;
    const grad=ctx.createLinearGradient(0,pc.t,0,pc.t+h);
    grad.addColorStop(0,'rgba(44,74,138,0.18)'); grad.addColorStop(1,'rgba(44,74,138,0)');
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); all.forEach(p=>ctx.lineTo(px(p.x),py(p.y)));
    ctx.lineTo(px(50),H-pc.b); ctx.lineTo(px(0),H-pc.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(px(0),py(0)); all.forEach(p=>ctx.lineTo(px(p.x),py(p.y)));
    ctx.strokeStyle='#D6E4FF'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
    const prog=all.filter(p=>p.x<=dp);
    if(prog.length>1){ctx.beginPath();ctx.moveTo(px(prog[0].x),py(prog[0].y));prog.forEach(p=>ctx.lineTo(px(p.x),py(p.y)));ctx.strokeStyle='#2c4a8a';ctx.lineWidth=2.5;ctx.stroke();}
    cps.forEach(cp=>{ctx.beginPath();ctx.arc(px(cp.x),py(cp.y),5,0,Math.PI*2);ctx.fillStyle=dp>=cp.x?'#2c4a8a':'#D6E4FF';ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();});
    ctx.fillStyle='#6B7FA3'; ctx.font='10px DM Sans'; ctx.textAlign='center';
    [0,25,50].forEach(i=>ctx.fillText(`Dia ${i}`,px(i),H-8));
  }

  function iniciarContagem(inv){
    if(cdInterval) clearInterval(cdInterval);
    function tick(){
      const agora=Date.now();
      const base=inv.ultimoGanho?(inv.ultimoGanho.toMillis?inv.ultimoGanho.toMillis():Number(inv.ultimoGanho)):inv.iniciadoEm?(inv.iniciadoEm.toMillis?inv.iniciadoEm.toMillis():Number(inv.iniciadoEm)):agora;
      const ciclo=24*60*60*1000,next=base+ciclo,rest=next-agora;
      const prog=Math.min(100,((ciclo-Math.max(0,rest))/ciclo)*100);
      if(rest<=0){
        ['cdH','cdM','cdS'].forEach(id=>document.getElementById(id).textContent='00');
        document.getElementById('progFill').style.width='100%';
        document.getElementById('progPct').textContent='100%';
        document.getElementById('ganhoStatus').textContent='Ganho pronto para resgatar!';
        document.getElementById('ganhoStatus').className='ganho-status pronto';
        document.getElementById('btnResgatar').classList.add('show');
        clearInterval(cdInterval);
      } else {
        document.getElementById('cdH').textContent=pad(rest/3600000);
        document.getElementById('cdM').textContent=pad((rest%3600000)/60000);
        document.getElementById('cdS').textContent=pad((rest%60000)/1000);
        document.getElementById('progFill').style.width=prog.toFixed(1)+'%';
        document.getElementById('progPct').textContent=prog.toFixed(0)+'%';
      }
    }
    tick(); cdInterval=setInterval(tick,1000);
  }

  window.resgatarGanho = async function(){
    if(!currentUser||!userData) return;
    const inv=userData.investimentoActivo; if(!inv) return;
    document.getElementById('spinnerOverlay').classList.add('show');
    try{
      const novoSaldo=(userData.saldo||0)+inv.diario;
      const userRef=doc(db,'users',currentUser.uid);
      await updateDoc(userRef,{saldo:novoSaldo,'investimentoActivo.ultimoGanho':serverTimestamp()});
      await addDoc(collection(db,'users',currentUser.uid,'historico'),{tipo:'ganho_diario',descricao:'Ganho diario - '+inv.nome,valor:inv.diario,data:serverTimestamp()});
      userData.saldo=novoSaldo;
      userData.investimentoActivo.ultimoGanho={toMillis:()=>Date.now()};
      document.getElementById('spinnerOverlay').classList.remove('show');
      document.getElementById('modalAmountVal').textContent=fmt(inv.diario);
      document.getElementById('modalOverlay').classList.add('show');
      document.getElementById('btnResgatar').classList.remove('show');
      document.getElementById('ganhoStatus').textContent='A aguardar o proximo ganho diario...';
      document.getElementById('ganhoStatus').className='ganho-status aguardar';
      iniciarContagem(userData.investimentoActivo);
    }catch(e){
      document.getElementById('spinnerOverlay').classList.remove('show');
      alert('Erro ao resgatar. Tente novamente.');
    }
  };

  window.closeModal = ()=>document.getElementById('modalOverlay').classList.remove('show');

  onAuthStateChanged(auth,async(user)=>{
    if(!user){window.location.href='auth.html';return;}
    currentUser=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    document.getElementById('spinnerOverlay').classList.remove('show');
    if(!snap.exists()) return;
    userData=snap.data();
    const inv=userData.investimentoActivo;
    if(!inv){renderSemInvestimento();return;}
    if(inv.tipo==='longo'){renderLongoPrazo(inv);}
    else{renderCurtoPrazo(inv);}
  });

  document.getElementById('spinnerOverlay').classList.add('show');
</script>
</body>
</html>
