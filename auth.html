<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExxonMobil — Investment Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #122040;
    --blue: #0d3a8e;
    --blue-light: #1a56cc;
    --red: #c8102e;
    --red-soft: #e8192e;
    --white: #ffffff;
    --off-white: #f7f8fc;
    --gray-100: #eef0f5;
    --gray-300: #c2c8d8;
    --gray-500: #7a849a;
    --text: #0d1117;
    --success: #0a7c4b;
    --warning: #b45309;
    --error: #c8102e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── OVERLAY ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,22,40,0.72);
    backdrop-filter: blur(6px);
    z-index: 900;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }

  .spinner-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .spinner {
    width: 56px; height: 56px;
    border: 4px solid rgba(255,255,255,.15);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .85s linear infinite;
  }
  .spinner-label {
    color: #fff; font-size: 14px; font-weight: 500; letter-spacing: .5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── HEADER / LOGO ─── */
  .auth-header {
    background: var(--navy);
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .auth-header::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,16,46,.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  .auth-header::after {
    content: '';
    position: absolute; bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(13,58,142,.4) 0%, transparent 70%);
    border-radius: 50%;
  }

  .logo-wrap {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    position: relative; z-index: 2;
    animation: fadeDown .6s ease both;
  }

  /* ExxonMobil SVG-style logo block */
  .logo-icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text-group { text-align: left; }
  .logo-exxon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px;
    color: var(--white); line-height: 1;
  }
  .logo-exxon span { color: var(--red); }
  .logo-mobil {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px;
    color: var(--gray-300); line-height: 1;
  }
  .logo-tagline {
    margin-top: 6px;
    font-size: 11px; color: rgba(255,255,255,.5);
    letter-spacing: 1.5px; text-transform: uppercase;
    position: relative; z-index: 2;
    animation: fadeDown .7s .1s ease both;
  }

  /* ─── TABS ─── */
  .tab-bar {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--gray-100);
    border-bottom: 2px solid var(--gray-100);
  }
  .tab-btn {
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--gray-500);
    background: none; border: none; cursor: pointer;
    position: relative; transition: color .25s;
    letter-spacing: .3px;
  }
  .tab-btn.active {
    color: var(--navy);
    background: var(--white);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--red);
  }

  /* ─── CONTAINER ─── */
  .auth-body { padding: 28px 20px 40px; }

  /* ─── INVITE BANNER ─── */
  .invite-banner {
    display: none;
    background: linear-gradient(135deg, #0a1628 0%, #0d3a8e 100%);
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 22px;
    flex-direction: row; align-items: center; gap: 12px;
    animation: fadeDown .4s ease both;
  }
  .invite-banner.show { display: flex; }
  .invite-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(200,16,46,.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .invite-text p { color: rgba(255,255,255,.7); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .invite-text strong { color: #fff; font-size: 13px; }

  /* ─── FORM ─── */
  .form-section { display: none; }
  .form-section.active { display: block; animation: fadeUp .35s ease both; }

  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--navy); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--gray-500); pointer-events: none;
  }
  .form-input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; color: var(--text);
    background: var(--off-white);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .form-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(13,58,142,.1);
    background: #fff;
  }
  .form-input.error { border-color: var(--red); }
  .form-input.success { border-color: var(--success); }

  /* PIN input */
  .pin-group { display: flex; gap: 8px; }
  .pin-digit {
    width: 100%; height: 52px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    text-align: center; font-size: 20px; font-weight: 700;
    font-family: 'Space Mono', monospace;
    color: var(--navy);
    background: var(--off-white);
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .pin-digit:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(13,58,142,.1);
    background: #fff;
  }
  .pin-digit.filled { border-color: var(--navy); background: #fff; }

  /* ─── PASSWORD STRENGTH ─── */
  .strength-bar {
    margin-top: 8px; display: flex; gap: 4px;
  }
  .strength-seg {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--gray-300); transition: background .3s;
  }
  .strength-label {
    margin-top: 4px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
  }

  /* ─── ALERTS ─── */
  .alert {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-radius: 10px;
    margin-top: 8px; font-size: 13px; line-height: 1.45;
    animation: slideIn .3s ease both;
  }
  .alert-icon { flex-shrink: 0; margin-top: 1px; }
  .alert.error { background: #fff0f2; border: 1px solid #fbc8d2; color: #9b0e24; }
  .alert.warning { background: #fff7ed; border: 1px solid #fed7aa; color: #92400e; }
  .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #065f46; }
  .alert.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a8a; }

  /* ─── BONUS BADGE ─── */
  .bonus-badge {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #0a7c4b 0%, #059669 100%);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 22px;
  }
  .bonus-badge-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bonus-badge p { color: rgba(255,255,255,.75); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .bonus-badge strong { color: #fff; font-size: 15px; }

  /* ─── BUTTON ─── */
  .btn-primary {
    width: 100%; padding: 15px;
    background: var(--navy);
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: .5px;
    border: none; border-radius: 12px; cursor: pointer;
    transition: background .2s, transform .1s;
    position: relative; overflow: hidden;
    margin-top: 6px;
  }
  .btn-primary::before {
    content: '';
    position: absolute; left: 0; top: 0;
    width: 4px; height: 100%;
    background: var(--red);
  }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

  .btn-link {
    background: none; border: none; cursor: pointer;
    color: var(--blue); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; text-decoration: underline;
    padding: 0;
  }
  .btn-link:hover { color: var(--red); }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0; color: var(--gray-500); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gray-300);
  }

  /* ─── FOOTER LINKS ─── */
  .footer-links {
    text-align: center; margin-top: 22px;
    font-size: 12px; color: var(--gray-500);
  }
  .footer-links a { color: var(--blue); text-decoration: none; font-weight: 600; }

  /* ─── RECOVER PASSWORD ─── */
  .recover-link-wrap {
    text-align: right; margin-top: -8px; margin-bottom: 14px;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ─── MODAL SUCCESS ─── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(10,22,40,.75);
    backdrop-filter: blur(8px);
    z-index: 950;
    align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal-sheet {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp .4s cubic-bezier(.25,.8,.25,1) both;
    text-align: center;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-icon {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 28px;
  }
  .modal-icon.success-icon { background: #f0fdf4; }
  .modal-icon.error-icon { background: #fff0f2; }
  .modal-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .modal-body { font-size: 14px; color: var(--gray-500); line-height: 1.6; margin-bottom: 24px; }
  .modal-btn {
    width: 100%; padding: 14px;
    border-radius: 12px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: .2s;
  }
  .modal-btn.primary { background: var(--navy); color: #fff; }
  .modal-btn.primary:hover { background: var(--navy-mid); }

  /* ─── STRENGTH COLORS ─── */
  .seg-weak { background: var(--red); }
  .seg-fair { background: var(--warning); }
  .seg-good { background: #2563eb; }
  .seg-strong { background: var(--success); }
</style>
</head>
<body>

<!-- Processing Overlay -->
<div class="overlay" id="overlay">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <span class="spinner-label" id="overlayLabel">Processing...</span>
  </div>
</div>

<!-- Success / Error Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <button class="modal-btn primary" id="modalBtn" onclick="closeModal()">Continue</button>
  </div>
</div>

<!-- HEADER -->
<div class="auth-header">
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- ExxonMobil-style X mark -->
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="10" fill="#c8102e"/>
        <text x="22" y="32" text-anchor="middle" font-family="Bebas Neue" font-size="26" fill="white">X</text>
      </svg>
    </div>
    <div class="logo-text-group">
      <div class="logo-exxon">E<span>xx</span>on<span style="color:var(--red)">M</span>obil</div>
      <div class="logo-mobil">INVESTMENTS</div>
    </div>
  </div>
  <p class="logo-tagline">Powering Portfolios Worldwide</p>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Create Account</button>
  <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Sign In</button>
</div>

<!-- BODY -->
<div class="auth-body">

  <!-- Invite Banner (hidden by default, shown if ?ref= param) -->
  <div class="invite-banner" id="inviteBanner">
    <div class="invite-icon">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6 5.87a4 4 0 100-8 4 4 0 000 8zm6-10a4 4 0 10-8 0 4 4 0 008 0z"/>
      </svg>
    </div>
    <div class="invite-text">
      <p>Invitation</p>
      <strong>You have been invited to join ExxonMobil Investments</strong>
    </div>
  </div>

  <!-- ── REGISTER FORM ── -->
  <div class="form-section active" id="section-register">

    <div class="bonus-badge">
      <div class="bonus-badge-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/>
        </svg>
      </div>
      <div>
        <p>Welcome bonus</p>
        <strong>Get Kz 100.00 free on registration</strong>
      </div>
    </div>

    <!-- Full Name -->
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </span>
        <input type="text" id="reg-name" class="form-input" placeholder="Your full name" oninput="validateName()" autocomplete="off">
      </div>
      <div id="name-alert"></div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/>
          </svg>
        </span>
        <input type="tel" id="reg-phone" class="form-input" placeholder="9XXXXXXXX" maxlength="13" oninput="validatePhone('reg-phone','phone-alert')" autocomplete="off">
      </div>
      <div id="phone-alert"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--gray-500);font-weight:400;text-transform:none;font-size:11px">(6 digits)</span></label>
      <div class="pin-group" id="reg-pin-group">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,0,'reg')" onkeydown="pinBack(event,this,0,'reg')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,1,'reg')" onkeydown="pinBack(event,this,1,'reg')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,2,'reg')" onkeydown="pinBack(event,this,2,'reg')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,3,'reg')" onkeydown="pinBack(event,this,3,'reg')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,4,'reg')" onkeydown="pinBack(event,this,4,'reg')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,5,'reg')" onkeydown="pinBack(event,this,5,'reg')">
      </div>
      <div class="strength-bar" id="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label" style="color:var(--gray-500)"></div>
      <div id="pin-alert"></div>
    </div>

    <button class="btn-primary" onclick="doRegister()">
      Create My Account
    </button>

    <div class="footer-links">
      Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign In</a>
    </div>
  </div>

  <!-- ── LOGIN FORM ── -->
  <div class="form-section" id="section-login">

    <!-- Phone -->
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/>
          </svg>
        </span>
        <input type="tel" id="login-phone" class="form-input" placeholder="9XXXXXXXX" maxlength="13" oninput="validatePhone('login-phone','login-phone-alert')" autocomplete="off">
      </div>
      <div id="login-phone-alert"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--gray-500);font-weight:400;text-transform:none;font-size:11px">(6 digits)</span></label>
      <div class="pin-group" id="login-pin-group">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,0,'login')" onkeydown="pinBack(event,this,0,'login')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,1,'login')" onkeydown="pinBack(event,this,1,'login')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,2,'login')" onkeydown="pinBack(event,this,2,'login')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,3,'login')" onkeydown="pinBack(event,this,3,'login')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,4,'login')" onkeydown="pinBack(event,this,4,'login')">
        <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" oninput="pinNext(this,5,'login')" onkeydown="pinBack(event,this,5,'login')">
      </div>
      <div id="login-pin-alert"></div>
    </div>

    <div class="recover-link-wrap">
      <button class="btn-link" onclick="recoverPassword()">Forgot your password?</button>
    </div>

    <button class="btn-primary" onclick="doLogin()">
      Sign In to My Account
    </button>

    <div class="footer-links">
      New here? <a href="#" onclick="switchTab('register');return false;">Create Account</a>
    </div>
  </div>

</div><!-- end auth-body -->

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",
    authDomain: "ascend-34bf0.firebaseapp.com",
    projectId: "ascend-34bf0",
    storageBucket: "ascend-34bf0.firebasestorage.app",
    messagingSenderId: "592623076677",
    appId: "1:592623076677:web:c5615719870aefdabf6a2c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* ── Helpers ── */
  function getPinValue(prefix) {
    const digits = document.querySelectorAll(`#${prefix}-pin-group .pin-digit`);
    return Array.from(digits).map(d => d.value).join('');
  }

  function phoneToEmail(phone) {
    return phone.replace(/\D/g, '') + '@exxonmobilinvest.app';
  }

  /* ── Read referral from URL ── */
  const urlParams = new URLSearchParams(window.location.search);
  const refId = urlParams.get('ref') || '';
  if (refId) {
    document.getElementById('inviteBanner').classList.add('show');
  }

  /* ── REGISTER ── */
  window.doRegister = async function() {
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const pin = getPinValue('reg');

    // Validate
    if (!name) { showAlert('name-alert','error','⚠️ Please enter your full name.'); return; }
    if (!/^[A-Za-zÀ-ÿ\s]+$/.test(name)) { showAlert('name-alert','error','⚠️ Name must contain letters only — no numbers or special characters.'); return; }
    if (name.split(' ').length < 2) { showAlert('name-alert','warning','💡 Please enter your first and last name.'); return; }
    if (!phone || phone.replace(/\D/g,'').length < 9) { showAlert('phone-alert','error','⚠️ Enter a valid phone number (minimum 9 digits).'); return; }
    if (pin.length < 6) { showAlert('pin-alert','error','🔒 Enter all 6 digits of your password.'); return; }
    if (!isStrongPin(pin)) { showAlert('pin-alert','warning','⚠️ Avoid obvious sequences like 123456 or 000000. Choose a unique combination.'); return; }

    showOverlay('Creating your account...');
    const email = phoneToEmail(phone);

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pin);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        fullName: name,
        phone: phone,
        balance: 100,
        bonus: 100,
        totalDeposited: 0,
        totalGains: 0,
        referredBy: refId || null,
        referralCode: cred.user.uid.slice(0,8).toUpperCase(),
        createdAt: serverTimestamp(),
        activePlan: null
      });
      hideOverlay();
      showModal('success','🎉','Account Created!',
        `Welcome, ${name.split(' ')[0]}! Your account is ready.\n\nYou received a welcome bonus of Kz 100.00. Start investing now.`,
        () => { window.location.href = 'index.html'; }
      );
    } catch (err) {
      hideOverlay();
      let msg = 'An error occurred. Please try again.';
      if (err.code === 'auth/email-already-in-use') msg = 'This phone number is already registered. Please sign in.';
      if (err.code === 'auth/weak-password') msg = 'Password too weak. Choose a stronger 6-digit combination.';
      showModal('error','❌','Registration Failed', msg);
    }
  };

  /* ── LOGIN ── */
  window.doLogin = async function() {
    const phone = document.getElementById('login-phone').value.trim();
    const pin = getPinValue('login');

    if (!phone || phone.replace(/\D/g,'').length < 9) { showAlert('login-phone-alert','error','⚠️ Enter your registered phone number.'); return; }
    if (pin.length < 6) { showAlert('login-pin-alert','error','🔒 Enter your 6-digit password.'); return; }

    showOverlay('Verifying your credentials...');
    const email = phoneToEmail(phone);
    try {
      await signInWithEmailAndPassword(auth, email, pin);
      hideOverlay();
      showModal('success','✅','Welcome Back!',
        'You have signed in successfully. Redirecting to your dashboard.',
        () => { window.location.href = 'index.html'; }
      );
    } catch (err) {
      hideOverlay();
      let msg = 'Sign in failed. Please try again.';
      if (err.code === 'auth/user-not-found') msg = 'No account found with this phone number. Please register first.';
      if (err.code === 'auth/wrong-password') msg = 'Incorrect password. Check your 6-digit PIN and try again.';
      if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Your account is temporarily locked. Try again later.';
      showModal('error','❌','Sign In Failed', msg);
    }
  };

  /* ── RECOVER ── */
  window.recoverPassword = function() {
    window.open('https://wa.me/932426257?text=Hello,%20I%20need%20help%20to%20recover%20my%20ExxonMobil%20Investments%20account%20password.', '_blank');
  };
</script>

<script>
  /* ── Tab switch ── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('section-'+tab).classList.add('active');
  }

  /* ── Overlay ── */
  function showOverlay(label) {
    document.getElementById('overlayLabel').textContent = label || 'Processing...';
    document.getElementById('overlay').classList.add('active');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.remove('active');
  }

  /* ── Modal ── */
  let modalCallback = null;
  function showModal(type, icon, title, body, cb) {
    document.getElementById('modalIcon').textContent = icon;
    document.getElementById('modalIcon').className = 'modal-icon ' + (type === 'success' ? 'success-icon' : 'error-icon');
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').textContent = body;
    document.getElementById('modalBackdrop').classList.add('open');
    modalCallback = cb || null;
  }
  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    if (modalCallback) { modalCallback(); modalCallback = null; }
  }

  /* ── Alerts ── */
  function showAlert(targetId, type, message) {
    const el = document.getElementById(targetId);
    el.innerHTML = `<div class="alert ${type}"><span class="alert-icon">${alertIcon(type)}</span><span>${message}</span></div>`;
    setTimeout(() => { if (el) el.innerHTML = ''; }, 5000);
  }
  function clearAlert(targetId) {
    const el = document.getElementById(targetId);
    if (el) el.innerHTML = '';
  }
  function alertIcon(type) {
    if (type === 'error') return '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>';
    if (type === 'warning') return '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#b45309" stroke-width="2.5"><path stroke-linecap="round" d="M12 9v4m0 3h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>';
    if (type === 'success') return '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
    return '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#1e3a8a" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 16v-4m0-4h.01"/></svg>';
  }

  /* ── Name validation ── */
  function validateName() {
    const val = document.getElementById('reg-name').value;
    if (val.length > 0 && /[^A-Za-zÀ-ÿ\s]/.test(val)) {
      document.getElementById('reg-name').classList.add('error');
      showAlert('name-alert','error','⚠️ Only letters are allowed in the name field.');
    } else {
      document.getElementById('reg-name').classList.remove('error');
      clearAlert('name-alert');
    }
  }

  /* ── Phone validation ── */
  function validatePhone(inputId, alertId) {
    const el = document.getElementById(inputId);
    el.value = el.value.replace(/[^0-9+]/g, '');
    const digits = el.value.replace(/\D/g,'');
    if (digits.length > 0 && digits.length < 9) {
      el.classList.add('error');
      showAlert(alertId,'warning','💡 Enter a valid phone number with at least 9 digits.');
    } else if (digits.length >= 9) {
      el.classList.remove('error');
      el.classList.add('success');
      clearAlert(alertId);
    } else {
      el.classList.remove('error','success');
      clearAlert(alertId);
    }
  }

  /* ── PIN navigation ── */
  function pinNext(el, idx, prefix) {
    el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
    if (el.value) {
      el.classList.add('filled');
      const next = el.parentElement.querySelectorAll('.pin-digit')[idx + 1];
      if (next) next.focus();
    } else {
      el.classList.remove('filled');
    }
    if (prefix === 'reg') checkPinStrength();
  }
  function pinBack(e, el, idx, prefix) {
    if (e.key === 'Backspace' && !el.value) {
      const prev = el.parentElement.querySelectorAll('.pin-digit')[idx - 1];
      if (prev) { prev.value = ''; prev.classList.remove('filled'); prev.focus(); }
    }
  }

  /* ── PIN strength ── */
  function isStrongPin(pin) {
    const weak = ['123456','654321','111111','222222','333333','444444','555555','666666','777777','888888','999999','000000','012345','543210'];
    return !weak.includes(pin);
  }
  function checkPinStrength() {
    const digits = Array.from(document.querySelectorAll('#reg-pin-group .pin-digit')).map(d => d.value);
    const pin = digits.join('');
    const filled = digits.filter(d => d !== '').length;
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    const segs = ['s1','s2','s3','s4'];
    segs.forEach(s => { document.getElementById(s).className = 'strength-seg'; });

    if (filled < 6) { label.textContent = ''; return; }

    const allSame = /^(.)\1+$/.test(pin);
    const isSeq = ['123456','234567','345678','456789','654321','543210'].includes(pin);
    const isWeak = ['000000','111111','222222','123456','654321','112233'].includes(pin);

    let score = 0;
    if (!allSame) score++;
    if (!isSeq) score++;
    if (!isWeak) score++;
    const hasVariety = new Set(pin.split('')).size >= 4;
    if (hasVariety) score++;

    const configs = [
      { cls: 'seg-weak',   text: 'Weak', color: 'var(--red)', count: 1 },
      { cls: 'seg-fair',   text: 'Fair', color: 'var(--warning)', count: 2 },
      { cls: 'seg-good',   text: 'Good', color: '#2563eb', count: 3 },
      { cls: 'seg-strong', text: 'Strong', color: 'var(--success)', count: 4 },
    ];
    const cfg = configs[Math.max(0, score - 1)];
    for (let i = 0; i < cfg.count; i++) document.getElementById(segs[i]).classList.add(cfg.cls);
    label.textContent = cfg.text + ' password';
    label.style.color = cfg.color;

    if (score < 3) {
      showAlert('pin-alert','warning','⚠️ This password is easy to guess. Try a less predictable combination for better security.');
    } else {
      clearAlert('pin-alert');
    }
  }
</script>
