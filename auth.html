<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExxonMobil — Investment Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;
  --blue:#1E6FBF;
  --blue2:#2a7fd4;
  --red:#c8102e;
  --white:#ffffff;
  --off:#f7f8fc;
  --g100:#eef0f5;
  --g300:#c2c8d8;
  --g500:#7a849a;
  --text:#0d1117;
  --green:#0a7c4b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.72);backdrop-filter:blur(6px);z-index:900;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.overlay.active{display:flex;}
.spinner{width:52px;height:52px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--red);border-radius:50%;animation:spin .85s linear infinite;}
.spinner-label{color:#fff;font-size:14px;font-weight:500;letter-spacing:.4px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(10,22,40,.75);backdrop-filter:blur(8px);z-index:950;align-items:flex-end;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;animation:slideUp .4s cubic-bezier(.25,.8,.25,1) both;text-align:center;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-result-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.modal-result-icon.ok{background:#f0fdf4;}
.modal-result-icon.fail{background:#fff0f2;}
.modal-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.modal-body{font-size:14px;color:var(--g500);line-height:1.6;margin-bottom:24px;}
.modal-btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'DM Sans';font-size:15px;font-weight:700;cursor:pointer;background:var(--navy);color:#fff;}

/* HEADER */
.auth-header{background:var(--navy);padding:28px 24px 24px;text-align:center;position:relative;overflow:hidden;}
.auth-header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(200,16,46,.25) 0%,transparent 70%);border-radius:50%;}
.auth-header::after{content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(30,111,191,.35) 0%,transparent 70%);border-radius:50%;}

.logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;position:relative;z-index:2;animation:fadeDown .5s ease both;}
.logo-x{width:44px;height:44px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:26px;color:#fff;}
.logo-text{text-align:left;}
.logo-exxon{font-family:'Bebas Neue';font-size:28px;color:#fff;letter-spacing:1px;line-height:1;}
.logo-exxon em{color:var(--red);font-style:normal;}
.logo-invest{font-family:'Bebas Neue';font-size:14px;color:rgba(255,255,255,.4);letter-spacing:3px;line-height:1;}
.logo-tagline{margin-top:6px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1.5px;text-transform:uppercase;position:relative;z-index:2;animation:fadeDown .6s .1s ease both;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* TABS */
.tab-bar{display:grid;grid-template-columns:1fr 1fr;background:var(--g100);}
.tab-btn{padding:14px;font-family:'DM Sans';font-size:14px;font-weight:600;color:var(--g500);background:none;border:none;cursor:pointer;position:relative;transition:color .2s;letter-spacing:.3px;}
.tab-btn.active{color:var(--navy);background:var(--white);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red);}

/* BODY */
.auth-body{padding:28px 20px 40px;}

/* INVITE BANNER */
.invite-banner{display:none;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:12px;padding:14px 16px;margin-bottom:22px;flex-direction:row;align-items:center;gap:12px;}
.invite-banner.show{display:flex;}
.invite-icon{width:36px;height:36px;border-radius:50%;background:rgba(200,16,46,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.invite-text p{color:rgba(255,255,255,.6);font-size:11px;text-transform:uppercase;letter-spacing:1px;}
.invite-text strong{color:#fff;font-size:13px;}

/* BONUS BADGE */
.bonus-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#0a7c4b,#059669);border-radius:12px;padding:14px 16px;margin-bottom:22px;}
.bonus-icon{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bonus-badge p{color:rgba(255,255,255,.7);font-size:11px;text-transform:uppercase;letter-spacing:1px;}
.bonus-badge strong{color:#fff;font-size:15px;}

/* FORM */
.form-section{display:none;}
.form-section.active{display:block;animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}

.input-wrap{position:relative;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--g500);pointer-events:none;}
.form-input{
  width:100%;padding:14px 14px 14px 42px;
  border:1.5px solid var(--g300);border-radius:10px;
  font-family:'DM Sans';font-size:15px;color:var(--text);
  background:var(--off);transition:border-color .2s,box-shadow .2s;outline:none;
  font-variant-numeric:normal;font-feature-settings:'kern';
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,111,191,.12);background:#fff;}
.form-input.error{border-color:var(--red);}
.form-input.ok{border-color:var(--green);}
/* Remove slashed zeros — use tabular nums without slashes */
.form-input[type="password"]{letter-spacing:4px;font-size:18px;}
.form-input[type="tel"],.form-input[type="text"]{letter-spacing:normal;}

/* PASSWORD STRENGTH */
.strength-row{display:flex;gap:4px;margin-top:8px;}
.strength-seg{flex:1;height:3px;border-radius:2px;background:var(--g300);transition:background .3s;}
.strength-label{margin-top:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

/* ALERTS */
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;margin-top:8px;font-size:13px;line-height:1.45;animation:slideIn .3s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.alert.error{background:#fff0f2;border:1px solid #fbc8d2;color:#9b0e24;}
.alert.warning{background:#fff7ed;border:1px solid #fed7aa;color:#92400e;}
.alert.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46;}

/* BUTTON */
.btn-primary{width:100%;padding:15px;background:var(--blue);color:#fff;font-family:'DM Sans';font-size:15px;font-weight:700;letter-spacing:.3px;border:none;border-radius:12px;cursor:pointer;transition:background .2s,transform .1s;margin-top:6px;}
.btn-primary:hover{background:var(--blue2);}
.btn-primary:active{transform:scale(.98);}
.btn-link{background:none;border:none;cursor:pointer;color:var(--blue);font-family:'DM Sans';font-size:13px;font-weight:600;text-decoration:underline;padding:0;}

/* RECOVER */
.recover-wrap{text-align:right;margin-top:-6px;margin-bottom:14px;}

/* FOOTER */
.footer-links{text-align:center;margin-top:20px;font-size:12px;color:var(--g500);}
.footer-links a{color:var(--blue);text-decoration:none;font-weight:600;}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <span class="spinner-label" id="overlayLabel">Processing...</span>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-result-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <button class="modal-btn" onclick="closeModal()">Continue</button>
  </div>
</div>

<!-- HEADER -->
<div class="auth-header">
  <div class="logo-wrap">
    <div class="logo-x">X</div>
    <div class="logo-text">
      <div class="logo-exxon">E<em>XX</em>ON<em>M</em>OBIL</div>
      <div class="logo-invest">INVESTMENTS</div>
    </div>
  </div>
  <p class="logo-tagline">Powering Portfolios Worldwide</p>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Create Account</button>
  <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Sign In</button>
</div>

<!-- BODY -->
<div class="auth-body">

  <!-- INVITE BANNER -->
  <div class="invite-banner" id="inviteBanner">
    <div class="invite-icon">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6 5.87a4 4 0 100-8 4 4 0 000 8zm6-10a4 4 0 10-8 0 4 4 0 008 0z"/></svg>
    </div>
    <div class="invite-text">
      <p>Invitation</p>
      <strong>You have been invited to join ExxonMobil Investments</strong>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="form-section active" id="section-register">
    <div class="bonus-badge">
      <div class="bonus-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/></svg>
      </div>
      <div>
        <p>Welcome bonus</p>
        <strong>Get Kz 100.00 free on registration</strong>
      </div>
    </div>

    <!-- Name -->
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>
        <input type="text" id="reg-name" class="form-input" placeholder="Your full name" oninput="validateName()" autocomplete="off">
      </div>
      <div id="name-alert"></div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg></span>
        <input type="tel" id="reg-phone" class="form-input" placeholder="9XXXXXXXX" maxlength="13" oninput="filterPhone('reg-phone','phone-alert')" autocomplete="off">
      </div>
      <div id="phone-alert"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--g500);font-weight:400;text-transform:none;font-size:11px;">(6 digits)</span></label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></span>
        <input type="password" id="reg-pass" class="form-input" placeholder="Enter 6-digit password" maxlength="6" inputmode="numeric" oninput="onRegPassInput()" autocomplete="new-password">
      </div>
      <div class="strength-row">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label" style="color:var(--g500);"></div>
      <div id="pass-alert"></div>
    </div>

    <button class="btn-primary" onclick="doRegister()">Create My Account</button>
    <div class="footer-links">Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign In</a></div>
  </div>

  <!-- LOGIN -->
  <div class="form-section" id="section-login">
    <!-- Phone -->
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg></span>
        <input type="tel" id="login-phone" class="form-input" placeholder="9XXXXXXXX" maxlength="13" oninput="filterPhone('login-phone','login-phone-alert')" autocomplete="off">
      </div>
      <div id="login-phone-alert"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password <span style="color:var(--g500);font-weight:400;text-transform:none;font-size:11px;">(6 digits)</span></label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></span>
        <input type="password" id="login-pass" class="form-input" placeholder="Enter 6-digit password" maxlength="6" inputmode="numeric" autocomplete="current-password">
      </div>
      <div id="login-pass-alert"></div>
    </div>

    <div class="recover-wrap">
      <button class="btn-link" onclick="recoverPassword()">Forgot your password?</button>
    </div>

    <button class="btn-primary" onclick="doLogin()">Sign In to My Account</button>
    <div class="footer-links">New here? <a href="#" onclick="switchTab('register');return false;">Create Account</a></div>
  </div>

</div><!-- end auth-body -->

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,updateProfile}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",authDomain:"ascend-34bf0.firebaseapp.com",projectId:"ascend-34bf0",storageBucket:"ascend-34bf0.firebasestorage.app",messagingSenderId:"592623076677",appId:"1:592623076677:web:c5615719870aefdabf6a2c"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);

const urlParams=new URLSearchParams(window.location.search);
const refId=urlParams.get('ref')||'';
if(refId)document.getElementById('inviteBanner').classList.add('show');

function phoneToEmail(p){return p.replace(/\D/g,'')+'@exxonmobilinvest.app';}

window.doRegister=async function(){
  const name=document.getElementById('reg-name').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  const pass=document.getElementById('reg-pass').value.trim();
  if(!name){showAlert('name-alert','error','Please enter your full name.');return;}
  if(!/^[A-Za-zÀ-ÿ\s]+$/.test(name)){showAlert('name-alert','error','Name must contain letters only — no numbers or symbols.');return;}
  if(name.trim().split(/\s+/).length<2){showAlert('name-alert','warning','Please enter your first and last name.');return;}
  if(!phone||phone.replace(/\D/g,'').length<9){showAlert('phone-alert','error','Enter a valid phone number (minimum 9 digits).');return;}
  if(pass.length<6){showAlert('pass-alert','error','Enter a 6-digit password.');return;}
  if(!isStrongPass(pass)){showAlert('pass-alert','warning','Avoid obvious sequences like 123456 or 000000. Choose a unique combination.');return;}
  showOverlay('Creating your account...');
  try{
    const cred=await createUserWithEmailAndPassword(auth,phoneToEmail(phone),pass);
    await updateProfile(cred.user,{displayName:name});
    await setDoc(doc(db,'users',cred.user.uid),{
      fullName:name,phone,balance:100,bonus:100,totalDeposited:0,totalGains:0,
      referredBy:refId||null,referralCode:cred.user.uid.slice(0,8).toUpperCase(),
      createdAt:serverTimestamp(),activePlan:null,streak:0
    });
    hideOverlay();
    showModal('ok',
      '<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>',
      'Account Created!',
      'Welcome, '+name.split(' ')[0]+'! Your account is ready. You received a welcome bonus of Kz 100.00.',
      ()=>{window.location.href='index.html';}
    );
  }catch(err){
    hideOverlay();
    let msg='An error occurred. Please try again.';
    if(err.code==='auth/email-already-in-use')msg='This phone number is already registered. Please sign in.';
    showModal('fail','<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>','Registration Failed',msg);
  }
};

window.doLogin=async function(){
  const phone=document.getElementById('login-phone').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  if(!phone||phone.replace(/\D/g,'').length<9){showAlert('login-phone-alert','error','Enter your registered phone number.');return;}
  if(pass.length<6){showAlert('login-pass-alert','error','Enter your 6-digit password.');return;}
  showOverlay('Verifying your credentials...');
  try{
    await signInWithEmailAndPassword(auth,phoneToEmail(phone),pass);
    hideOverlay();
    showModal('ok',
      '<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#0a7c4b" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>',
      'Welcome Back!','You have signed in successfully. Redirecting to your dashboard.',
      ()=>{window.location.href='index.html';}
    );
  }catch(err){
    hideOverlay();
    let msg='Sign in failed. Please try again.';
    if(err.code==='auth/user-not-found')msg='No account found with this phone number. Please register first.';
    if(err.code==='auth/wrong-password')msg='Incorrect password. Check your 6-digit PIN and try again.';
    if(err.code==='auth/too-many-requests')msg='Too many failed attempts. Your account is temporarily locked.';
    showModal('fail','<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#c8102e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>','Sign In Failed',msg);
  }
};

window.recoverPassword=function(){
  window.open('https://wa.me/932426257?text=Hello,%20I%20need%20help%20to%20recover%20my%20ExxonMobil%20Investments%20account%20password.','_blank');
};

function isStrongPass(p){
  const weak=['123456','654321','111111','222222','333333','444444','555555','666666','777777','888888','999999','000000','012345','543210'];
  return !weak.includes(p);
}
</script>

<script>
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('section-'+tab).classList.add('active');
}
function showOverlay(label){
  document.getElementById('overlayLabel').textContent=label||'Processing...';
  document.getElementById('overlay').classList.add('active');
}
function hideOverlay(){document.getElementById('overlay').classList.remove('active');}

let modalCb=null;
function showModal(type,iconHtml,title,body,cb){
  const ic=document.getElementById('modalIcon');
  ic.className='modal-result-icon '+(type==='ok'?'ok':'fail');
  ic.innerHTML=iconHtml;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').textContent=body;
  document.getElementById('modalBackdrop').classList.add('open');
  modalCb=cb||null;
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  if(modalCb){modalCb();modalCb=null;}
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=`<div class="alert ${type}">${msg}</div>`;
  setTimeout(()=>{if(el)el.innerHTML='';},5000);
}
function clearAlert(id){const el=document.getElementById(id);if(el)el.innerHTML='';}

function filterPhone(inputId,alertId){
  const el=document.getElementById(inputId);
  el.value=el.value.replace(/[^0-9+]/g,'');
  const digits=el.value.replace(/\D/g,'');
  if(digits.length>0&&digits.length<9){el.classList.add('error');showAlert(alertId,'warning','Enter a valid phone number with at least 9 digits.');}
  else if(digits.length>=9){el.classList.remove('error');el.classList.add('ok');clearAlert(alertId);}
  else{el.classList.remove('error','ok');clearAlert(alertId);}
}

function validateName(){
  const val=document.getElementById('reg-name').value;
  if(val.length>0&&/[^A-Za-zÀ-ÿ\s]/.test(val)){
    document.getElementById('reg-name').classList.add('error');
    showAlert('name-alert','error','Only letters are allowed in the name field.');
  }else{
    document.getElementById('reg-name').classList.remove('error');
    clearAlert('name-alert');
  }
}

function onRegPassInput(){
  const val=document.getElementById('reg-pass').value.replace(/[^0-9]/g,'');
  document.getElementById('reg-pass').value=val;
  if(val.length===6)checkStrength(val);
  else{['s1','s2','s3','s4'].forEach(s=>{document.getElementById(s).style.background='';});document.getElementById('strength-label').textContent='';}
}

function checkStrength(p){
  const allSame=/^(.)\1+$/.test(p);
  const seqList=['123456','234567','654321','543210','000000','111111','222222','333333','444444','555555','666666','777777','888888','999999'];
  const isWeak=seqList.includes(p)||allSame;
  const variety=new Set(p.split('')).size;
  let score=0;
  if(!allSame)score++;
  if(!isWeak)score++;
  if(variety>=3)score++;
  if(variety>=4)score++;
  const segs=['s1','s2','s3','s4'];
  const configs=[
    {color:'#c8102e',text:'Weak',count:1},
    {color:'#b45309',text:'Fair',count:2},
    {color:'#1E6FBF',text:'Good',count:3},
    {color:'#0a7c4b',text:'Strong',count:4},
  ];
  const cfg=configs[Math.max(0,score-1)];
  segs.forEach((s,i)=>{document.getElementById(s).style.background=i<cfg.count?cfg.color:'';});
  const lbl=document.getElementById('strength-label');
  lbl.textContent=cfg.text+' password';
  lbl.style.color=cfg.color;
  if(score<3){showAlert('pass-alert','warning','This password is easy to guess. Try a less predictable combination.');}
  else clearAlert('pass-alert');
}
</script>
