<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Magnus Capital — Levantamento</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1B3A6B;--navy-dark:#0F2347;--white:#FFFFFF;--off-white:#F8F6F3;--black:#0D0D0D;--gray-soft:#6B6B6B;--gray-line:#E0DEDD;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--black)}
    .bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#F0F4FF 0%,#EEF2FB 50%,#F5F8FF 100%)}
    .bg-layer::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(27,58,107,0.07) 0%,transparent 70%);animation:pbg 8s ease infinite alternate}
    @keyframes pbg{from{transform:scale(1)}to{transform:scale(1.15)}}

    .header{position:sticky;top:0;z-index:100;background:rgba(240,244,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-line);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px}
    .back-btn{width:36px;height:36px;border:1.5px solid var(--gray-line);border-radius:10px;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--black);transition:all .25s;flex-shrink:0}
    .back-btn:hover{border-color:var(--navy);color:var(--navy)}
    .h-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}

    .content{position:relative;z-index:1;padding:20px 20px 40px;max-width:500px;margin:0 auto}

    /* ── MINI BALANCE CARD — igual ao index ── */
    .balance-card{background:var(--white);border-radius:18px;padding:14px 18px;margin-bottom:16px;border:1px solid var(--gray-line);box-shadow:0 4px 24px rgba(0,0,0,.06);animation:fadeUp .6s ease both;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .bc-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
    .bc-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-soft);font-weight:600}
    .bc-amount-row{display:flex;align-items:baseline;gap:5px}
    .bc-amount{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:600;color:var(--black);line-height:1;white-space:nowrap;letter-spacing:0}
    .bc-currency{font-size:13px;font-weight:500;color:var(--gray-soft);letter-spacing:0}
    .bc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .bc-accent{background:var(--navy);border-radius:10px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:1px}
    .bc-accent-val{font-size:12px;font-weight:700;color:var(--white);line-height:1;white-space:nowrap}
    .bc-accent-lbl{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.07em;text-transform:uppercase}

    /* ── TABS (igual ao auth) ── */
    .tabs{display:flex;gap:4px;background:var(--white);border-radius:16px;padding:5px;margin-bottom:16px;border:1px solid var(--gray-line);box-shadow:0 2px 12px rgba(0,0,0,.04);animation:fadeUp .6s ease .05s both}
    .tab-btn{flex:1;padding:11px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;background:transparent;color:var(--gray-soft);letter-spacing:.01em}
    .tab-btn.active{background:var(--navy);color:var(--white);box-shadow:0 4px 14px rgba(27,58,107,.28)}

    /* ── PANELS ── */
    .panel{display:none}
    .panel.visible{display:block;animation:fadeIn .35s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    /* ── INFO PILLS ── */
    .info-pills{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .info-pill{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--white);border-radius:10px;font-size:12px;color:var(--gray-soft);border:1px solid var(--gray-line)}
    .info-pill svg{width:15px;height:15px;color:var(--navy);flex-shrink:0}

    /* ── FORM CARD ── */
    .card{background:var(--white);border-radius:18px;padding:22px;margin-bottom:14px;border:1px solid var(--gray-line);box-shadow:0 4px 20px rgba(0,0,0,.04)}
    .card-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:16px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:6px}
    .input-wrap{position:relative}
    .input-wrap input{width:100%;padding:13px 48px 13px 14px;border:1.5px solid var(--gray-line);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;background:#FAFAF9;color:var(--black);outline:none;transition:all .25s}
    .input-wrap input:focus{border-color:var(--navy);background:var(--white);box-shadow:0 0 0 4px rgba(27,58,107,.08)}
    .input-suffix{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--gray-soft);font-weight:500}

    .fee-preview{background:var(--off-white);border-radius:12px;padding:13px 15px;margin-bottom:14px;border:1px solid var(--gray-line)}
    .fp-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
    .fp-row.total{font-weight:600;padding-top:9px;border-top:1px solid var(--gray-line);margin-top:5px}
    .fp-row span:first-child{color:var(--gray-soft)}
    .fp-row span.red{color:var(--navy);font-weight:600}

    .btn-main{width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 8px 28px rgba(27,58,107,.28)}
    .btn-main:hover{background:var(--navy-dark);transform:translateY(-1px)}
    .btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none}

    /* ── HISTORY ── */
    .hist-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--gray-line)}
    .hist-item:last-child{border-bottom:none}
    .hist-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hist-icon.pending{background:rgba(245,158,11,.1);color:#D97706}
    .hist-icon.approved{background:rgba(22,163,74,.1);color:#16A34A}
    .hist-icon.rejected{background:rgba(27,58,107,.1);color:var(--navy)}
    .hist-icon svg{width:17px;height:17px}
    .hist-info{flex:1}
    .hist-amount{font-size:14px;font-weight:600}
    .hist-date{font-size:11px;color:var(--gray-soft);margin-top:1px}
    .hist-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.05em}
    .hist-badge.pending{background:rgba(245,158,11,.1);color:#D97706}
    .hist-badge.approved{background:rgba(22,163,74,.1);color:#16A34A}
    .hist-badge.rejected{background:rgba(27,58,107,.1);color:var(--navy)}
    .hist-empty{text-align:center;padding:32px 20px;color:var(--gray-soft);font-size:13px}
    .hist-empty svg{width:36px;height:36px;margin:0 auto 10px;display:block;opacity:.3}

    /* ── SPINNER ── */
    .spinner-overlay{position:fixed;inset:0;z-index:1000;background:rgba(248,246,243,.88);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
    .spinner-overlay.show{opacity:1;pointer-events:all}
    .spinner-ring{width:68px;height:68px}
    .spinner-ring svg{width:100%;height:100%;animation:spin 1.2s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner-ring svg circle{fill:none;stroke-width:3;stroke-linecap:round}
    .spinner-ring svg circle.track{stroke:rgba(27,58,107,.15)}
    .spinner-ring svg circle.arc{stroke:var(--navy);stroke-dasharray:160;stroke-dashoffset:40}
    .spinner-label{margin-top:18px;font-size:13px;font-weight:500;color:var(--gray-soft)}

    /* ── TOAST ── */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(calc(-100% - 30px));opacity:0;visibility:hidden;background:var(--white);border-radius:13px;padding:12px 18px;box-shadow:0 14px 44px rgba(0,0,0,.13);border-left:4px solid var(--navy);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;z-index:9999;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease,visibility 0s linear .4s;max-width:92vw;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:all;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease,visibility 0s linear 0s}
    .toast.success{border-left-color:#16A34A}
    .toast.error{border-left-color:var(--navy)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg-layer"></div>

<div class="spinner-overlay" id="spinner">
  <div class="spinner-ring"><svg viewBox="0 0 72 72"><circle class="track" cx="36" cy="36" r="30"/><circle class="arc" cx="36" cy="36" r="30"/></svg></div>
  <p class="spinner-label">A processar...</p>
</div>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<div class="header">
  <a href="index.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="h-title">Levantamento</div>
</div>

<div class="content">

  <!-- MINI BALANCE CARD — igual ao index -->
  <div class="balance-card">
    <div class="bc-left">
      <div class="bc-label">Saldo Disponível</div>
      <div class="bc-amount-row">
        <div class="bc-amount" id="heroBalance">0</div>
        <div class="bc-currency">Kz</div>
      </div>
    </div>
    <div class="bc-right">
      <div class="bc-accent">
        <div class="bc-accent-val">15%</div>
        <div class="bc-accent-lbl">Taxa</div>
      </div>
    </div>
  </div>

  <!-- TABS — lado levantamento | lado histórico -->
  <div class="tabs">
    <button class="tab-btn active" id="tabW" onclick="switchTab('withdraw')">Levantar</button>
    <button class="tab-btn" id="tabH" onclick="switchTab('history')">Histórico</button>
  </div>

  <!-- PANEL: LEVANTAMENTO -->
  <div class="panel visible" id="panelWithdraw">
    <div class="info-pills">
      <div class="info-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Processamento: 30 min a 24h &middot; Sexta-feira até 72h</div>
      <div class="info-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M5 20h14"/></svg>Mínimo 800 Kz &middot; Máximo 100.000 Kz por dia</div>
    </div>

    <div class="card">
      <div class="card-title">Solicitar Levantamento</div>
      <div class="field">
        <label>Valor a Levantar</label>
        <div class="input-wrap">
          <input type="number" id="wAmount" placeholder="Mínimo 800" min="800" max="100000" oninput="calcFee(this.value)"/>
          <span class="input-suffix">Kz</span>
        </div>
      </div>
      <div class="fee-preview" id="feePreview" style="display:none">
        <div class="fp-row"><span>Valor solicitado</span><span id="fpGross">—</span></div>
        <div class="fp-row"><span>Taxa (15%)</span><span class="red" id="fpFee">—</span></div>
        <div class="fp-row total"><span>Receberá</span><span id="fpNet">—</span></div>
      </div>
      <button class="btn-main" id="wBtn" onclick="doWithdraw()">Solicitar Levantamento</button>
    </div>
  </div>

  <!-- PANEL: HISTÓRICO -->
  <div class="panel" id="panelHistory">
    <div class="card">
      <div class="card-title">Histórico de Saques</div>
      <div id="histList">
        <div class="hist-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M5 20h14"/></svg>
          Sem levantamentos registados.
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import{getFirestore,doc,getDoc,updateDoc,increment,collection,addDoc,query,where,orderBy,getDocs,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg={apiKey:"AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",authDomain:"ascend-34bf0.firebaseapp.com",projectId:"ascend-34bf0",storageBucket:"ascend-34bf0.firebasestorage.app",messagingSenderId:"592623076677",appId:"1:592623076677:web:c5615719870aefdabf6a2c"};
  const app=initializeApp(cfg);
  const auth=getAuth(app);
  const db=getFirestore(app);

  let uid='', userBalance=0;
  function fmt(n){return Number(n).toLocaleString('pt-AO');}

  onAuthStateChanged(auth, async user=>{
    if(!user){window.location.href='auth.html';return;}
    uid=user.uid;
    const snap=await getDoc(doc(db,'users',uid));
    if(!snap.exists())return;
    const d=snap.data();
    userBalance=d.balance||0;
    document.getElementById('heroBalance').textContent=fmt(userBalance);
    loadHistory();
  });

  async function loadHistory(){
    try{
      const q=query(collection(db,'withdrawals'),where('uid','==',uid),orderBy('createdAt','desc'));
      const snaps=await getDocs(q);
      const list=document.getElementById('histList');
      if(snaps.empty){
        list.innerHTML='<div class="hist-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M5 20h14"/></svg>Sem levantamentos registados.</div>';
        return;
      }
      list.innerHTML='';
      snaps.forEach(d=>{
        const w=d.data();
        const sm={pending:'Em análise',approved:'Aprovado',rejected:'Rejeitado'};
        const dt=w.createdAt?.toDate?.()?.toLocaleDateString('pt-AO')||'—';
        list.innerHTML+=`<div class="hist-item">
          <div class="hist-icon ${w.status||'pending'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M5 20h14"/></svg>
          </div>
          <div class="hist-info">
            <div class="hist-amount">${fmt(w.amount)} Kz</div>
            <div class="hist-date">${dt}</div>
          </div>
          <span class="hist-badge ${w.status||'pending'}">${sm[w.status||'pending']}</span>
        </div>`;
      });
    }catch(e){}
  }

  window.doWithdraw=async function(){
    const amount=parseInt(document.getElementById('wAmount').value)||0;
    if(amount<800){window.toast('O valor mínimo de levantamento é 800 Kz.','error');return;}
    if(amount>100000){window.toast('O valor máximo diário é 100.000 Kz.','error');return;}
    if(amount>userBalance){window.toast('Saldo insuficiente para este levantamento.','error');return;}

    document.getElementById('spinner').classList.add('show');
    document.getElementById('wBtn').disabled=true;

    try{
      // 1. Registar o pedido de levantamento
      await addDoc(collection(db,'withdrawals'),{
        uid, amount,
        fee: Math.round(amount*0.15),
        netAmount: Math.round(amount*0.85),
        status:'pending',
        createdAt: serverTimestamp()
      });

      // 2. DEBITAR o saldo do utilizador imediatamente
      await updateDoc(doc(db,'users',uid),{
        balance: increment(-amount)
      });

      // 3. Actualizar valor local
      userBalance -= amount;
      document.getElementById('heroBalance').textContent=fmt(userBalance);

      document.getElementById('spinner').classList.remove('show');
      window.toast('Solicitação enviada! Saldo debitado.','success');
      document.getElementById('wAmount').value='';
      document.getElementById('feePreview').style.display='none';

      // Mudar para aba histórico e recarregar
      switchTab('history');
      loadHistory();

    }catch(e){
      document.getElementById('spinner').classList.remove('show');
      window.toast('Erro ao processar. Tente novamente.','error');
    }
    document.getElementById('wBtn').disabled=false;
  };
</script>

<script>
  function fmt(n){return Number(n).toLocaleString('pt-AO');}

  function switchTab(tab){
    document.getElementById('panelWithdraw').classList.toggle('visible', tab==='withdraw');
    document.getElementById('panelHistory').classList.toggle('visible', tab==='history');
    document.getElementById('panelWithdraw').classList.toggle('panel', true);
    document.getElementById('panelHistory').classList.toggle('panel', true);
    document.getElementById('tabW').classList.toggle('active', tab==='withdraw');
    document.getElementById('tabH').classList.toggle('active', tab==='history');
    if(tab==='withdraw'){
      document.getElementById('panelWithdraw').style.display='block';
      document.getElementById('panelHistory').style.display='none';
    } else {
      document.getElementById('panelWithdraw').style.display='none';
      document.getElementById('panelHistory').style.display='block';
    }
  }

  function calcFee(val){
    const v=parseInt(val)||0;
    const fp=document.getElementById('feePreview');
    if(v>=800){
      fp.style.display='block';
      const fee=Math.round(v*0.15);
      document.getElementById('fpGross').textContent=fmt(v)+' Kz';
      document.getElementById('fpFee').textContent='-'+fmt(fee)+' Kz';
      document.getElementById('fpNet').textContent=fmt(v-fee)+' Kz';
    } else {
      fp.style.display='none';
    }
  }

  let _tt=null;
  function toast(msg,type){
    if(_tt)clearTimeout(_tt);
    const t=document.getElementById('toast'),m=document.getElementById('toastMsg');
    t.className='toast';m.textContent='';void t.offsetHeight;
    m.textContent=msg;t.className='toast '+(type||'success')+' show';
    _tt=setTimeout(()=>{t.classList.remove('show');_tt=setTimeout(()=>{t.className='toast';},450);},3200);
  }
  window.toast=toast;
</script>
</body>
</html>
