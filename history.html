<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filmora Meta — Historico</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--blue:#0056D2;--blue-light:#E8F0FD;--green:#00A86B;--red:#D9231E;--orange:#F47920;--black:#0A0A0A;--grey:#6B7280;--grey-light:#F3F4F6;--border:#E5E7EB;--white:#FFFFFF;}
    html,body{min-height:100vh;font-family:'Sora',sans-serif;background:#F0F4FF;color:var(--black);}

    .overlay{position:fixed;inset:0;background:rgba(10,10,10,0.55);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .overlay.active{display:flex;}
    .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .page{padding-bottom:40px;}

    .header{background:var(--blue);padding:52px 20px 28px;position:relative;overflow:hidden;}
    .header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,255,255,0.06);border-radius:50%;}
    .header-top{display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;z-index:1;}
    .back-btn{width:38px;height:38px;background:rgba(255,255,255,0.12);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .back-btn svg{color:#fff;width:18px;height:18px;}
    .header-title{font-size:20px;font-weight:700;color:#fff;}
    .header-sub{font-size:13px;color:rgba(255,255,255,0.65);}

    /* SUMMARY CHIPS */
    .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1;}
    .summary-chip{background:rgba(255,255,255,0.12);border-radius:14px;padding:12px 10px;text-align:center;}
    .summary-chip-val{font-size:14px;font-weight:800;color:#fff;font-family:'DM Mono',monospace;}
    .summary-chip-label{font-size:10px;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}

    /* FILTER TABS */
    .filter-tabs{display:flex;gap:8px;padding:16px 16px 0;overflow-x:auto;}
    .filter-tabs::-webkit-scrollbar{display:none;}
    .filter-tab{flex-shrink:0;padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--white);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--grey);cursor:pointer;transition:all 0.2s;}
    .filter-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}

    .content{padding:16px;}

    /* GROUPED LIST */
    .group-label{font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;margin-top:4px;}
    .history-list{background:var(--white);border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px;}
    .history-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);}
    .history-item:last-child{border-bottom:none;}
    .history-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .history-icon.dep{background:rgba(0,168,107,0.10);color:var(--green);}
    .history-icon.ret{background:rgba(217,35,30,0.08);color:var(--red);}
    .history-icon.inv{background:rgba(0,86,210,0.08);color:var(--blue);}
    .history-icon.bon{background:rgba(244,121,32,0.10);color:var(--orange);}
    .history-icon svg{width:19px;height:19px;}
    .history-info{flex:1;min-width:0;}
    .history-desc{font-size:13px;font-weight:600;color:var(--black);}
    .history-meta{font-size:11px;color:var(--grey);margin-top:2px;}
    .history-amount{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;text-align:right;flex-shrink:0;}
    .history-amount.dep{color:var(--green);}
    .history-amount.ret{color:var(--red);}
    .history-amount.inv{color:var(--blue);}
    .history-amount.bon{color:var(--orange);}
    .status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;margin-top:3px;display:inline-block;}
    .status-pill.pendente{background:rgba(244,121,32,0.12);color:var(--orange);}
    .status-pill.aprovado{background:rgba(0,168,107,0.10);color:var(--green);}
    .status-pill.rejeitado{background:rgba(217,35,30,0.08);color:var(--red);}

    .empty-state{text-align:center;padding:48px 24px;color:var(--grey);}
    .empty-icon{width:64px;height:64px;background:var(--grey-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
    .empty-icon svg{width:28px;height:28px;}
    .empty-title{font-size:16px;font-weight:700;color:var(--black);margin-bottom:6px;}
    .empty-sub{font-size:13px;}

    .load-more{width:100%;padding:13px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;margin-top:4px;transition:all 0.2s;}
    .load-more:hover{background:var(--blue-light);}
  </style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<div class="page">
  <div class="header">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div>
        <div class="header-title">Historico</div>
        <div class="header-sub">Todos os movimentos da sua conta</div>
      </div>
    </div>
    <div class="summary-row">
      <div class="summary-chip"><div class="summary-chip-val" id="sum-total">0</div><div class="summary-chip-label">Movimentos</div></div>
      <div class="summary-chip"><div class="summary-chip-val" id="sum-dep">0</div><div class="summary-chip-label">Depositado</div></div>
      <div class="summary-chip"><div class="summary-chip-val" id="sum-ret">0</div><div class="summary-chip-label">Retirado</div></div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="applyFilter('todos',this)">Todos</button>
    <button class="filter-tab" onclick="applyFilter('deposito',this)">Depositos</button>
    <button class="filter-tab" onclick="applyFilter('retirada',this)">Retiradas</button>
    <button class="filter-tab" onclick="applyFilter('investimento',this)">Investimentos</button>
    <button class="filter-tab" onclick="applyFilter('rendimento',this)">Rendimentos</button>
    <button class="filter-tab" onclick="applyFilter('bonus',this)">Bonus</button>
  </div>

  <div class="content" id="history-content">
    <div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg></div>
      <div class="empty-title">A carregar...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",authDomain:"pinnacle-finance-b2626.firebaseapp.com",projectId:"pinnacle-finance-b2626",storageBucket:"pinnacle-finance-b2626.firebasestorage.app",messagingSenderId:"1032490368286",appId:"1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"});
const auth=getAuth(app),db=getFirestore(app);
let allMovements=[],currentFilter='todos',pageSize=20,showing=20;

function fmt(n){return Number(n||0).toLocaleString('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2});}

const TYPE_MAP={
  deposito:{label:'Deposito recebido',cls:'dep',prefix:'+',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`},
  retirada:{label:'Levantamento',cls:'ret',prefix:'-',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`},
  investimento:{label:'Investimento activado',cls:'inv',prefix:'-',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`},
  bonus:{label:'Bonus',cls:'bon',prefix:'+',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>`},
  rendimento:{label:'Rendimento diario',cls:'bon',prefix:'+',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`},
};

function groupByMonth(movs){
  const groups={};
  movs.forEach(m=>{
    const d=m.data?new Date(m.data.seconds*1000):new Date();
    const key=d.toLocaleDateString('pt-AO',{month:'long',year:'numeric'});
    if(!groups[key]) groups[key]=[];
    groups[key].push(m);
  });
  return groups;
}

function renderMovements(){
  const filtered=currentFilter==='todos'?allMovements:allMovements.filter(m=>m.tipo===currentFilter);
  const visible=filtered.slice(0,showing);
  const groups=groupByMonth(visible);
  const content=document.getElementById('history-content');

  if(!filtered.length){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg></div><div class="empty-title">Sem movimentos</div><div class="empty-sub">Nao ha registos para este filtro.</div></div>`;
    return;
  }

  let html='';
  Object.entries(groups).forEach(([month,movs])=>{
    html+=`<div class="group-label">${month}</div><div class="history-list">`;
    movs.forEach(m=>{
      const t=TYPE_MAP[m.tipo]||TYPE_MAP.bonus;
      const d=m.data?new Date(m.data.seconds*1000):new Date();
      const dateStr=d.toLocaleDateString('pt-AO',{day:'2-digit',month:'short',year:'numeric'});
      const timeStr=d.toLocaleTimeString('pt-AO',{hour:'2-digit',minute:'2-digit'});
      const statusHtml=m.estado&&m.estado!=='—'?`<div class="status-pill ${m.estado}">${m.estado}</div>`:'';
      html+=`
        <div class="history-item">
          <div class="history-icon ${t.cls}">${t.icon}</div>
          <div class="history-info">
            <div class="history-desc">${t.label}${m.planId?' — '+m.planId:''}</div>
            <div class="history-meta">${dateStr} • ${timeStr}</div>
            ${statusHtml}
          </div>
          <div class="history-amount ${t.cls}">${t.prefix} Kz ${fmt(m.valor)}</div>
        </div>`;
    });
    html+=`</div>`;
  });
  if(filtered.length>showing){
    html+=`<button class="load-more" onclick="loadMore()">Carregar mais</button>`;
  }
  content.innerHTML=html;
}

window.applyFilter=(f,btn)=>{
  currentFilter=f; showing=pageSize;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMovements();
};

window.loadMore=()=>{showing+=pageSize;renderMovements();};

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='auth.html';return;}
  document.getElementById('overlay').classList.add('active');
  try{
    const q=query(collection(db,'movimentos'),where('uid','==',user.uid),orderBy('data','desc'));
    const snap=await getDocs(q);
    allMovements=snap.docs.map(d=>d.data());
    const totalDep=allMovements.filter(m=>m.tipo==='deposito').reduce((s,m)=>s+m.valor,0);
    const totalRet=allMovements.filter(m=>m.tipo==='retirada').reduce((s,m)=>s+m.valor,0);
    document.getElementById('sum-total').textContent=allMovements.length;
    document.getElementById('sum-dep').textContent=fmt(totalDep);
    document.getElementById('sum-ret').textContent=fmt(totalRet);
    renderMovements();
  }catch(e){console.error(e);}
  document.getElementById('overlay').classList.remove('active');
});
</script>
</body>
</html>
