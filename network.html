<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora Meta — Minha Rede</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ27ogn8Us8FZct_DdYkFFv9vQkaHrPL4",
      authDomain: "pinnacle-finance-b2626.firebaseapp.com",
      projectId: "pinnacle-finance-b2626",
      storageBucket: "pinnacle-finance-b2626.firebasestorage.app",
      messagingSenderId: "1032490368286",
      appId: "1:1032490368286:web:d77c9a1a888dd3c1c5dd0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showNotif(msg, type) {
      const n=document.getElementById('notification');
      n.textContent=msg; n.className='notification '+(type==='error'?'notif-error':'notif-success');
      n.style.display='block'; setTimeout(()=>{ n.style.display='none'; },4000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href='auth.html'; return; }
      const snap = await getDoc(doc(db,'users',user.uid));
      if (!snap.exists()) { window.location.href='auth.html'; return; }
      const data = snap.data();
      const accountId = data.accountId || '';

      // build dynamic referral link
      const baseUrl = window.location.origin + '/auth.html';
      const refLink = `${baseUrl}?ref=${accountId}`;
      document.getElementById('ref-link-display').textContent = refLink;

      document.getElementById('account-id-display').textContent = accountId;
      document.getElementById('total-refs').textContent = '0';
      document.getElementById('active-refs').textContent = '0';
      document.getElementById('total-earned').textContent = '0,00';

      window.copyLink = function() {
        navigator.clipboard.writeText(refLink).then(()=>{ showNotif('Link copiado!','success'); });
      };

      // load referrals
      const refQ = query(collection(db,'referrals'), where('referrerId','==',user.uid));
      const refSnap = await getDocs(refQ);
      const refs = [];
      for (const d of refSnap.docs) {
        const r = d.data();
        // get referred user info
        const uSnap = await getDoc(doc(db,'users',r.newUserId));
        const uData = uSnap.exists() ? uSnap.data() : {};
        // check if has investment
        const invQ = query(collection(db,'investments'), where('uid','==',r.newUserId));
        const invSnap = await getDocs(invQ);
        refs.push({ ...r, email: uData.email||'—', accountId: uData.accountId||'—', hasInvestment: !invSnap.empty });
      }

      document.getElementById('total-refs').textContent = refs.length;
      const active = refs.filter(r=>r.hasInvestment).length;
      document.getElementById('active-refs').textContent = active;

      const list = document.getElementById('refs-list');
      if (!refs.length) {
        list.innerHTML = '<div class="refs-empty">Nenhum convidado ainda. Partilhe o seu link para comecar a ganhar.</div>';
        return;
      }
      list.innerHTML = refs.map(r => `
        <div class="ref-item">
          <div class="ref-left">
            <div class="ref-avatar">${(r.email||'?')[0].toUpperCase()}</div>
            <div>
              <div class="ref-email">${r.email}</div>
              <div class="ref-id">ID: ${r.accountId}</div>
            </div>
          </div>
          <div class="ref-status ${r.hasInvestment ? 'status-active' : 'status-pending'}">
            ${r.hasInvestment ? 'Investiu' : 'Pendente'}
          </div>
        </div>`).join('');
    });
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--blue:#3B82F6;--orange:#F59E0B;--green:#10B981;--red:#EF4444;--black:#000;--white:#fff;}
    html{height:100%;}
    body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--black);min-height:100vh;overflow-y:auto;overflow-x:hidden;padding-bottom:90px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(59,130,246,.08) 0%,transparent 55%),radial-gradient(ellipse at 100% 100%,rgba(59,130,246,.08) 0%,transparent 55%);pointer-events:none;z-index:0;}
    .deco-circle{position:fixed;border-radius:50%;background:transparent;pointer-events:none;z-index:0;}
    .tl-1{width:420px;height:420px;top:-140px;left:-140px;border:1.5px solid rgba(59,130,246,.14);}
    .tl-2{width:280px;height:280px;top:-70px;left:-70px;border:1.5px solid rgba(59,130,246,.10);}
    .br-1{width:360px;height:360px;bottom:-120px;right:-120px;border:1.5px solid rgba(59,130,246,.14);}
    .br-2{width:200px;height:200px;bottom:-60px;right:-60px;border:1.5px solid rgba(59,130,246,.10);}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px;}

    .page-header{padding:20px 0 16px;display:flex;align-items:center;gap:12px;}
    .back-arrow{width:36px;height:36px;border-radius:11px;background:rgba(59,130,246,.08);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .back-arrow svg{width:16px;height:16px;stroke:var(--blue);fill:none;stroke-width:2;}
    .page-title{font-size:1.1rem;font-weight:700;}

    /* COMMISSION CARD */
    .commission-card{background:linear-gradient(135deg,#1D4ED8 0%,#3B82F6 60%,#60A5FA 100%);border-radius:20px;padding:22px 20px;margin-bottom:18px;box-shadow:0 6px 24px rgba(59,130,246,.25);position:relative;overflow:hidden;}
    .commission-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.07);}
    .comm-label{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;}
    .comm-pct{font-size:2rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;margin-bottom:4px;}
    .comm-desc{font-size:.78rem;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:14px;}
    .comm-stats{display:flex;gap:12px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15);}
    .comm-stat{flex:1;}
    .comm-stat-val{font-size:1rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
    .comm-stat-label{font-size:.65rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

    /* REF LINK */
    .ref-link-card{background:rgba(255,255,255,.65);backdrop-filter:blur(12px);border:1px solid rgba(59,130,246,.13);border-radius:18px;padding:16px 18px;margin-bottom:18px;}
    .ref-link-title{font-size:.75rem;font-weight:700;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
    .ref-link-box{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);border-radius:11px;padding:11px 14px;font-family:'DM Mono',monospace;font-size:.72rem;color:rgba(0,0,0,.6);word-break:break-all;line-height:1.5;margin-bottom:10px;}
    .copy-link-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .15s;box-shadow:0 3px 14px rgba(59,130,246,.28);}
    .copy-link-btn:active{transform:scale(.96);}
    .copy-link-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;}

    /* REFS LIST */
    .section-title{font-size:.88rem;font-weight:700;margin-bottom:12px;}
    .ref-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:rgba(255,255,255,.65);backdrop-filter:blur(10px);border:1px solid rgba(59,130,246,.1);border-radius:14px;margin-bottom:8px;}
    .ref-left{display:flex;align-items:center;gap:11px;}
    .ref-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#60A5FA);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#fff;flex-shrink:0;}
    .ref-email{font-size:.83rem;font-weight:600;color:var(--black);}
    .ref-id{font-size:.68rem;color:rgba(0,0,0,.35);font-family:'DM Mono',monospace;margin-top:2px;}
    .ref-status{font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;}
    .status-active{background:rgba(16,185,129,.1);color:var(--green);}
    .status-pending{background:rgba(0,0,0,.06);color:rgba(0,0,0,.4);}
    .refs-empty{text-align:center;padding:28px 16px;font-size:.82rem;color:rgba(0,0,0,.4);line-height:1.6;}

    .notification{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 22px;border-radius:12px;font-size:.85rem;font-weight:600;white-space:nowrap;animation:notif-slide .3s ease;box-shadow:0 6px 24px rgba(0,0,0,.12);max-width:90vw;text-align:center;}
    @keyframes notif-slide{from{opacity:0;top:8px}to{opacity:1;top:20px}}
    .notif-success{background:linear-gradient(135deg,var(--green) 0%,var(--blue) 100%);color:#fff;}
    .notif-error{background:var(--red);color:#fff;}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border-top:1px solid rgba(59,130,246,.12);display:flex;justify-content:space-around;align-items:center;padding:10px 0 16px;z-index:100;}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;flex:1;}
    .nav-item svg{width:22px;height:22px;stroke:rgba(0,0,0,.3);fill:none;stroke-width:2;}
    .nav-item span{font-size:.65rem;font-weight:600;color:rgba(0,0,0,.3);letter-spacing:.3px;}
  </style>
</head>
<body>
  <div class="deco-circle tl-1"></div><div class="deco-circle tl-2"></div>
  <div class="deco-circle br-1"></div><div class="deco-circle br-2"></div>
  <div id="notification" class="notification"></div>

  <div class="page">
    <div class="page-header">
      <button class="back-arrow" onclick="history.back()"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
      <div class="page-title">Minha Rede</div>
    </div>

    <!-- COMMISSION CARD -->
    <div class="commission-card">
      <div class="comm-label">Comissao de Referencia</div>
      <div class="comm-pct">12%</div>
      <div class="comm-desc">Ganha 12% sobre o primeiro investimento de cada amigo que convidar.</div>
      <div class="comm-stats">
        <div class="comm-stat">
          <div class="comm-stat-val" id="total-refs">0</div>
          <div class="comm-stat-label">Convidados</div>
        </div>
        <div class="comm-stat">
          <div class="comm-stat-val" id="active-refs">0</div>
          <div class="comm-stat-label">Investiram</div>
        </div>
        <div class="comm-stat">
          <div class="comm-stat-val" id="total-earned">0,00</div>
          <div class="comm-stat-label">AOA Ganhos</div>
        </div>
      </div>
    </div>

    <!-- REF LINK -->
    <div class="ref-link-card">
      <div class="ref-link-title">O Seu Link de Convite</div>
      <div class="ref-link-box" id="ref-link-display">A carregar...</div>
      <button class="copy-link-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copiar Link de Convite
      </button>
    </div>

    <!-- REFS LIST -->
    <div class="section-title">Pessoas Convidadas</div>
    <div id="refs-list">
      <div class="refs-empty">A carregar...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Inicial</span></a>
    <a class="nav-item" href="plans.html"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><span>Planos</span></a>
    <a class="nav-item" href="plans.html#tasks"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span>Tarefas</span></a>
    <a class="nav-item" href="menu.html"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg><span>Menu</span></a>
  </nav>

  <script>
    document.addEventListener('click', e=>{
      const btn=e.target.closest('button');
      if(!btn) return;
      btn.style.transform='scale(0.96)';
      setTimeout(()=>{ btn.style.transform=''; },150);
    });
  </script>
</body>
</html>
