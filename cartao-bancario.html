<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaixepa SA - Cartao Bancario</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1a3a6b; --navy-mid: #1e4d8c; --navy-light: #2560a8;
      --orange: #f57c00; --off-white: #f8faff;
      --text-dark: #0d0d0d; --text-muted: #5a6a7e;
      --border: #dce6f5; --success: #2e7d32; --error: #c62828;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--off-white); }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse 70% 40% at 0% 0%, rgba(26,58,107,0.05) 0%, transparent 60%); pointer-events: none; z-index: 0; }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--navy), var(--navy-mid), var(--navy-light), var(--navy)); z-index: 200; }

    .header { position: fixed; top: 3px; left: 0; right: 0; height: 56px; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100; }
    .btn-back { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .btn-back:hover { background: var(--off-white); }
    .btn-back svg { width: 18px; height: 18px; fill: none; stroke: var(--navy); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); }

    .main { position: relative; z-index: 1; padding: 75px 16px 40px; }

    /* Cartao visual estilo banco */
    .bank-card-visual {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
      border-radius: 20px;
      padding: 24px 22px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      min-height: 160px;
      box-shadow: 0 8px 32px rgba(26,58,107,0.25);
    }

    .bank-card-visual::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }

    .bank-card-visual::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 20px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .card-bank-name {
      font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-chip {
      width: 32px; height: 24px;
      background: linear-gradient(135deg, #f0c040, #d4a017);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }

    .card-chip svg { width: 20px; height: 20px; fill: rgba(0,0,0,0.3); }

    .card-iban {
      font-family: 'Sora', sans-serif;
      font-size: 16px; font-weight: 700;
      color: white;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .card-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .card-holder-label {
      font-size: 10px; color: rgba(255,255,255,0.55);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .card-holder-name {
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700; color: white;
    }

    .card-logo {
      width: 40px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }

    .card-logo-circles {
      display: flex;
    }

    .card-logo-circles span {
      width: 22px; height: 22px;
      border-radius: 50%;
      opacity: 0.8;
    }

    .card-logo-circles span:first-child {
      background: #eb001b;
      margin-right: -8px;
    }

    .card-logo-circles span:last-child {
      background: #f79e1b;
    }

    /* Estado: sem cartao */
    .info-banner {
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      color: white;
    }

    .info-banner-title { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .info-banner-text { font-size: 12px; opacity: 0.8; line-height: 1.6; }

    /* Alerta bloqueio */
    .alert-locked {
      background: #fff3e0; border: 1px solid #ffcc80;
      border-radius: 12px; padding: 14px 16px;
      margin-bottom: 18px;
      display: flex; gap: 10px; align-items: flex-start;
    }

    .alert-locked-icon {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
    }

    .alert-locked-icon svg { width: 20px; height: 20px; fill: none; stroke: var(--orange); stroke-width: 1.8; }

    .alert-locked-text { font-size: 13px; color: #e65100; line-height: 1.5; }
    .alert-locked-text strong { display: block; font-family: 'Sora', sans-serif; font-weight: 700; margin-bottom: 2px; }

    /* Formulario */
    .form-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .form-card-header {
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      padding: 14px 16px;
    }

    .form-card-header-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: white; }
    .form-card-header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .form-body { padding: 18px 16px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark);
      background: var(--off-white); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px rgba(30,77,140,0.1); background: white; }
    .field input:disabled { background: #f0f0f0; color: var(--text-muted); cursor: not-allowed; border-color: var(--border); }
    .field-error { font-size: 11px; color: var(--error); margin-top: 4px; display: none; }
    .field-error.show { display: block; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      color: white; border: none; border-radius: 12px;
      font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Dados guardados - view mode */
    .saved-row {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .saved-row:last-child { border-bottom: none; }
    .saved-key { font-size: 12px; color: var(--text-muted); }
    .saved-val { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; color: var(--navy); }

    /* Spinner */
    .spinner-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .spinner-overlay.show { opacity: 1; pointer-events: all; }
    .spinner-ring { width: 52px; height: 52px; border: 3px solid var(--border); border-top-color: var(--navy-mid); border-radius: 50%; animation: spin 0.75s linear infinite; }
    .spinner-text { margin-top: 14px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: var(--navy); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-sheet { width: 100%; max-width: 480px; background: white; border-radius: 24px 24px 0 0; padding: 28px 24px 44px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 22px; }
    .modal-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .modal-icon.success { background: #e8f5e9; }
    .modal-icon.error { background: #ffebee; }
    .modal-icon svg { width: 28px; height: 28px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .modal-msg { font-size: 14px; color: var(--text-muted); text-align: center; line-height: 1.6; margin-bottom: 22px; }
    .btn-modal-close { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); color: white; border: none; border-radius: 12px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner-ring"></div>
    <div class="spinner-text">A carregar...</div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon" id="modalIcon">
        <svg id="modalIconSvg" viewBox="0 0 24 24"></svg>
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <button class="btn-modal-close" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <div class="header">
    <button class="btn-back" onclick="history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title">Cartao Bancario</span>
  </div>

  <div class="main" id="mainContent">
    <!-- Preenchido pelo JS -->
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U",
      authDomain: "ascend-34bf0.firebaseapp.com",
      projectId: "ascend-34bf0",
      storageBucket: "ascend-34bf0.firebasestorage.app",
      messagingSenderId: "592623076677",
      appId: "1:592623076677:web:c5615719870aefdabf6a2c"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    function mascaraIBAN(iban) {
      // Mostra apenas primeiros 4 e ultimos 4 caracteres
      const limpo = iban.replace(/\s/g, '');
      if (limpo.length < 8) return iban;
      const inicio = limpo.substring(0, 4);
      const fim = limpo.substring(limpo.length - 4);
      const meio = '•'.repeat(Math.max(0, limpo.length - 8));
      return inicio + ' ' + meio + ' ' + fim;
    }

    function renderSalvo(conta) {
      const ibanMask = mascaraIBAN(conta.iban);
      document.getElementById('mainContent').innerHTML = `
        <div class="bank-card-visual">
          <div class="card-top">
            <div class="card-bank-name">${conta.banco}</div>
            <div class="card-chip">
              <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="7" y1="10" x2="7" y2="18"/></svg>
            </div>
          </div>
          <div class="card-iban">${ibanMask}</div>
          <div class="card-bottom">
            <div>
              <div class="card-holder-label">Titular</div>
              <div class="card-holder-name">${conta.nomeTitular}</div>
            </div>
            <div class="card-logo">
              <div class="card-logo-circles">
                <span></span><span></span>
              </div>
            </div>
          </div>
        </div>

        <div class="alert-locked">
          <div class="alert-locked-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
          <div class="alert-locked-text">
            <strong>Conta bancaria bloqueada</strong>
            Apos guardar, os dados da conta bancaria nao podem ser alterados ou eliminados. Contacte o suporte se precisar de assistencia.
          </div>
        </div>

        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-header-title">Dados da conta registada</div>
            <div class="form-card-header-sub">Informacoes guardadas de forma permanente</div>
          </div>
          <div class="saved-row">
            <span class="saved-key">Nome do titular</span>
            <span class="saved-val">${conta.nomeTitular}</span>
          </div>
          <div class="saved-row">
            <span class="saved-key">IBAN</span>
            <span class="saved-val">${ibanMask}</span>
          </div>
          <div class="saved-row">
            <span class="saved-key">Banco</span>
            <span class="saved-val">${conta.banco}</span>
          </div>
        </div>
      `;
    }

    function renderFormulario() {
      document.getElementById('mainContent').innerHTML = `
        <div class="bank-card-visual">
          <div class="card-top">
            <div class="card-bank-name">Nome do Banco</div>
            <div class="card-chip">
              <svg viewBox="0 0 24 24" fill="rgba(0,0,0,0.3)"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="2" y1="10" x2="22" y2="10" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/></svg>
            </div>
          </div>
          <div class="card-iban" id="previewIban">•••• •••••••••• ••••</div>
          <div class="card-bottom">
            <div>
              <div class="card-holder-label">Titular</div>
              <div class="card-holder-name" id="previewNome">O seu nome</div>
            </div>
            <div class="card-logo">
              <div class="card-logo-circles">
                <span></span><span></span>
              </div>
            </div>
          </div>
        </div>

        <div class="info-banner">
          <div class="info-banner-title">Importante - Leia antes de guardar</div>
          <div class="info-banner-text">Apos guardar os dados bancarios, nao sera possivel editar ou eliminar as informacoes. Certifique-se de que os dados estao correctos antes de confirmar.</div>
        </div>

        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-header-title">Adicionar conta bancaria</div>
            <div class="form-card-header-sub">Preencha os dados correctamente</div>
          </div>
          <div class="form-body">
            <div class="field">
              <label>Nome completo do titular</label>
              <input type="text" id="inputNome" placeholder="Nome como aparece no banco" oninput="previewUpdate()" />
              <div class="field-error" id="errNome">Introduza o nome completo do titular</div>
            </div>
            <div class="field">
              <label>IBAN</label>
              <input type="text" id="inputIban" placeholder="Ex: 0040.0000.0000.0000.0000.0" oninput="previewUpdate()" />
              <div class="field-error" id="errIban">Introduza um IBAN valido</div>
            </div>
            <div class="field">
              <label>Nome do banco</label>
              <select id="inputBanco">
                <option value="">Seleccionar banco</option>
                <option value="BAI">BAI - Banco Angolano de Investimentos</option>
                <option value="BFA">BFA - Banco de Fomento Angola</option>
                <option value="BPC">BPC - Banco de Poupanca e Credito</option>
                <option value="BIC">BIC - Banco BIC</option>
                <option value="Atlantico">Banco Atlantico</option>
                <option value="Sol">Banco Sol</option>
                <option value="Millennium">Banco Millennium Atlantico</option>
                <option value="Outro">Outro</option>
              </select>
              <div class="field-error" id="errBanco">Seleccione o banco</div>
            </div>
            <button class="btn-primary" onclick="guardarConta()">Guardar conta bancaria</button>
          </div>
        </div>
      `;
    }

    window.previewUpdate = function() {
      const nome = document.getElementById('inputNome')?.value || '';
      const iban = document.getElementById('inputIban')?.value || '';
      const pNome = document.getElementById('previewNome');
      const pIban = document.getElementById('previewIban');
      if (pNome) pNome.textContent = nome || 'O seu nome';
      if (pIban) {
        if (iban.length >= 8) {
          pIban.textContent = mascaraIBAN(iban);
        } else {
          pIban.textContent = '•••• •••••••••• ••••';
        }
      }
    };

    window.guardarConta = async function() {
      const nome = document.getElementById('inputNome').value.trim();
      const iban = document.getElementById('inputIban').value.trim();
      const banco = document.getElementById('inputBanco').value;
      let valid = true;

      document.getElementById('errNome').classList.remove('show');
      document.getElementById('errIban').classList.remove('show');
      document.getElementById('errBanco').classList.remove('show');

      if (!nome || nome.split(' ').length < 2) {
        document.getElementById('errNome').classList.add('show'); valid = false;
      }
      if (!iban || iban.replace(/[\s.]/g, '').length < 10) {
        document.getElementById('errIban').classList.add('show'); valid = false;
      }
      if (!banco) {
        document.getElementById('errBanco').classList.add('show'); valid = false;
      }
      if (!valid) return;

      showSpinner('A guardar...');

      try {
        const conta = { nomeTitular: nome, iban: iban, banco: banco, guardadoEm: serverTimestamp() };
        await updateDoc(doc(db, 'users', currentUser.uid), { contaBancaria: conta });

        hideSpinner();
        showModal('success', 'Conta guardada!', 'Os dados da sua conta bancaria foram guardados com sucesso. Nao sera possivel alterar esta informacao.');

        // Mostrar vista guardada apos fechar modal
        window._afterModalClose = () => renderSalvo({ nomeTitular: nome, iban, banco });

      } catch(e) {
        hideSpinner();
        showModal('error', 'Erro ao guardar', 'Ocorreu um erro ao guardar os dados. Verifique a sua ligacao e tente novamente.');
      }
    };

    function showModal(tipo, titulo, msg) {
      const icon = document.getElementById('modalIcon');
      const svg = document.getElementById('modalIconSvg');
      icon.className = 'modal-icon ' + tipo;
      if (tipo === 'success') {
        svg.setAttribute('stroke', '#2e7d32');
        svg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      } else {
        svg.setAttribute('stroke', '#c62828');
        svg.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
      }
      document.getElementById('modalTitle').textContent = titulo;
      document.getElementById('modalMsg').textContent = msg;
      document.getElementById('modalOverlay').classList.add('show');
    }

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('show');
      if (window._afterModalClose) {
        window._afterModalClose();
        window._afterModalClose = null;
      }
    };

    function showSpinner(msg) {
      document.getElementById('spinnerOverlay').querySelector('.spinner-text') && (document.getElementById('spinnerOverlay').querySelector('.spinner-text').textContent = msg || '');
      document.getElementById('spinnerOverlay').classList.add('show');
    }

    function hideSpinner() {
      document.getElementById('spinnerOverlay').classList.remove('show');
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'auth.html'; return; }
      currentUser = user;

      const snap = await getDoc(doc(db, 'users', user.uid));
      hideSpinner();

      if (!snap.exists()) return;
      const d = snap.data();

      if (d.contaBancaria && d.contaBancaria.iban) {
        renderSalvo(d.contaBancaria);
      } else {
        renderFormulario();
      }
    });

    document.getElementById('spinnerOverlay').classList.add('show');
  </script>
</body>
</html>
