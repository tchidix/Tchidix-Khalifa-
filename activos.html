<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaixepa SA - Meus Activos</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1a3a6b; --navy-mid: #1e4d8c; --navy-light: #2560a8;
      --orange: #f57c00; --off-white: #f8faff;
      --text-dark: #0d0d0d; --text-muted: #5a6a7e;
      --border: #dce6f5; --success: #2e7d32; --error: #c62828;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--off-white); }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse 70% 40% at 0% 0%, rgba(26,58,107,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--navy), var(--navy-mid), var(--navy-light), var(--navy)); z-index: 200; }
    .header { position: fixed; top: 3px; left: 0; right: 0; height: 56px; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100; }
    .btn-back { width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-back svg { width: 18px; height: 18px; fill: none; stroke: var(--navy); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); }
    .main { position: relative; z-index: 1; padding: 75px 16px 40px; }

    .info-banner { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border-radius: 16px; padding: 18px; margin-bottom: 20px; }
    .info-banner-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; color: white; margin-bottom: 4px; }
    .info-banner-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.6; }

    .invest-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
    .invest-card-header { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); padding: 16px; display: flex; align-items: center; justify-content: space-between; }
    .invest-card-name { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: white; }
    .invest-card-badge { background: rgba(0,200,83,0.25); border: 1px solid rgba(0,200,83,0.4); border-radius: 20px; padding: 3px 12px; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; color: #69f0ae; }
    .invest-card-badge.inactivo { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
    .invest-card-body { padding: 16px; }
    .invest-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .istat { background: var(--off-white); border-radius: 10px; padding: 12px; }
    .istat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .istat-val { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); }
    .istat-val.green { color: var(--success); }
    .invest-date { font-size: 12px; color: var(--text-muted); padding-top: 10px; border-top: 1px solid var(--border); }

    .empty-state { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 32px 20px; text-align: center; }
    .empty-icon { width: 52px; height: 52px; background: #eef3fb; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .empty-icon svg { width: 26px; height: 26px; fill: none; stroke: var(--navy-mid); stroke-width: 1.8; }
    .empty-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
    .btn-primary { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); color: white; border: none; border-radius: 12px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }

    .spinner-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .spinner-overlay.show { opacity: 1; pointer-events: all; }
    .spinner-ring { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--navy-mid); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner-ring"></div></div>
  <div class="header">
    <button class="btn-back" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="header-title">Meus Activos</span>
  </div>
  <div class="main">
    <div class="info-banner">
      <div class="info-banner-title">Os seus investimentos</div>
      <div class="info-banner-text">Acompanhe aqui o estado dos seus investimentos activos e o progresso dos seus ganhos diarios.</div>
    </div>
    <div id="activosContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({ apiKey: "AIzaSyBp8X1PPp3FqiQ6OXErr8Mu11GEp6MZ2-U", authDomain: "ascend-34bf0.firebaseapp.com", projectId: "ascend-34bf0", storageBucket: "ascend-34bf0.firebasestorage.app", messagingSenderId: "592623076677", appId: "1:592623076677:web:c5615719870aefdabf6a2c" });
    const auth = getAuth(app), db = getFirestore(app);

    function fmt(n) { return (n || 0).toLocaleString('pt-AO') + ' Kz'; }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'auth.html'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      document.getElementById('spinnerOverlay').classList.remove('show');
      if (!snap.exists()) return;
      const d = snap.data();
      const cont = document.getElementById('activosContent');
      if (!d.investimentoActivo) {
        cont.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M6 20V10l6-8 6 8v10"/></svg></div><div class="empty-title">Nenhum activo</div><div class="empty-sub">Ainda nao possui nenhum investimento activo.</div><a class="btn-primary" href="compra.html">Investir agora</a></div>`;
        return;
      }
      const inv = d.investimentoActivo;
      const dataInicio = inv.iniciadoEm ? new Date(inv.iniciadoEm.toMillis ? inv.iniciadoEm.toMillis() : inv.iniciadoEm).toLocaleDateString('pt-AO') : '--';
      cont.innerHTML = `
        <div class="invest-card">
          <div class="invest-card-header">
            <div class="invest-card-name">${inv.nome}</div>
            <div class="invest-card-badge">Activo</div>
          </div>
          <div class="invest-card-body">
            <div class="invest-stats">
              <div class="istat"><div class="istat-label">Capital investido</div><div class="istat-val">${fmt(inv.valor)}</div></div>
              <div class="istat"><div class="istat-label">Ganho diario</div><div class="istat-val green">${fmt(inv.diario)}</div></div>
              <div class="istat"><div class="istat-label">Tipo de plano</div><div class="istat-val">${inv.tipo === 'curto' ? 'Curto Prazo' : 'Longo Prazo'}</div></div>
              <div class="istat"><div class="istat-label">Duracao</div><div class="istat-val">${inv.dias ? inv.dias + ' dias' : 'Ilimitado'}</div></div>
            </div>
            <div class="invest-date">Investimento iniciado em: ${dataInicio}</div>
          </div>
        </div>
      `;
    });
    document.getElementById('spinnerOverlay').classList.add('show');
  </script>
</body>
</html>
